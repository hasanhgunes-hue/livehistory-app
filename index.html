  const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);

}

// ── DYNAMIC SYSTEM PROMPT ─────────────────────────────────────────────────────
function buildSystemPrompt(agentId, ctx) {
  const base = AGENT_PROMPTS[agentId];
  const { day, timeIdx, chronicle, activityLog, playerName } = ctx;

  const myEvents = chronicle
    .filter(e => e.agents.includes("all") || e.agents.includes(agentId))
    .slice(0, 8);
  const otherActivity = activityLog
    .filter(a => a.agentId !== agentId)
    .slice(-5);

  let ctxBlock = `\n\n──── ŞU AN ────\nGün ${day} · ${TIME_LABELS[timeIdx]} ${TIME_ICONS[timeIdx]} · İstanbul, 1550`;

  if (myEvents.length > 0) {
    ctxBlock += `\n\n──── SON OLAYLAR (sizin gerçekten haberdar olduklarınız) ────`;
    myEvents.forEach(e => {
      ctxBlock += `\n· (G${e.day}-${TIME_LABELS[e.t][0]}) ${e.text}`;
    });
    ctxBlock += `\n\nBu olaylar gerçekten yaşandı. Doğal düşerse atıfta bulun ("az önce duydum ki…"). Suni yapma.`;
  }

  if (otherActivity.length > 0) {
    ctxBlock += `\n\n──── SARAY KULAĞI (${playerName} hakkında işitilenler) ────`;
    otherActivity.forEach(a => {
      const otherName = AGENT_META[a.agentId]?.name || "biri";
      ctxBlock += `\n· ${playerName}, ${otherName} ile şunu konuştu: "${a.topic}"`;
    });
    ctxBlock += `\n\nBu dedikodulara doğal düşerse atıfta bulun, kendi karakter perspektifinle.`;
  }

  return base + ctxBlock;
}

// ── API CALL (browser-direct with user's key) ─────────────────────────────────
async function fetchAgentReply({ agentId, history, userMsg, ctx, apiKey, model }) {
  const apiMessages = history.map(m => ({
    role: m.role === "user" ? "user" : "assistant",
    content: m.text,
  }));
  apiMessages.push({ role: "user", content: userMsg });

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: model || "claude-sonnet-4-5-20250929",
      max_tokens: 1024,
      system: buildSystemPrompt(agentId, ctx),
      messages: apiMessages,
    }),
  });

  if (!res.ok) {
    const errText = await res.text();
    let msg;
    try { msg = JSON.parse(errText)?.error?.message || errText; }
    catch { msg = errText || `HTTP ${res.status}`; }
    throw new Error(msg);
  }

  const data = await res.json();
  return data.content?.[0]?.text || "...";
}

function App() {
  const [phase,        setPhase]        = useState("apikey"); // apikey -> intro -> game
  const [apiKey,       setApiKey]       = useState("");
  const [model,        setModel]        = useState("claude-sonnet-4-5-20250929");
  const [player,       setPlayer]       = useState("Yolcu");
  const [locId,        setLocId]        = useState("topkapi");
  const [agentId,      setAgentId]      = useState(null);
  const [convos,       setConvos]       = useState({});
  const [input,        setInput]        = useState("");
  const [busy,         setBusy]         = useState(false);
  const [waiting,      setWaiting]      = useState(false);
  const [evIdx,        setEvIdx]        = useState(0);
  const [day,          setDay]          = useState(1);
  const [timeIdx,      setTimeIdx]      = useState(0);
  const [chronicle,    setChronicle]    = useState([]);
  const [activityLog,  setActivityLog]  = useState([]);
  const [chronicleOpen,setChronicleOpen]= useState(false);
  const [newEventFlash,setNewEventFlash]= useState(false);

  const chatEnd   = useRef(null);
  const typeTimer = useRef(null);

  useEffect(() => {
    const t = setInterval(() => setEvIdx(i => (i + 1) % EVENTS.length), 7000);
    return () => clearInterval(t);
  }, []);

  useEffect(() => {
    if (phase !== "game") return;
    const t = setInterval(() => {
      setTimeIdx(prev => { if (prev >= 3) { setDay(d => d + 1); return 0; } return prev + 1; });
    }, TICK_MS);
    return () => clearInterval(t);
  }, [phase]);

  useEffect(() => {
    if (phase !== "game") return;
    const newEvents = TIMELINE.filter(e => e.day === day && e.t === timeIdx);
    if (newEvents.length > 0) {
      setChronicle(c => [...newEvents, ...c].slice(0, 60));
      setNewEventFlash(true);
      const tm = setTimeout(() => setNewEventFlash(false), 4000);
      return () => clearTimeout(tm);
    }
  }, [day, timeIdx, phase]);

  useEffect(() => { chatEnd.current?.scrollIntoView({ behavior: "smooth" }); }, [convos, agentId, waiting]);
  useEffect(() => () => clearInterval(typeTimer.current), []);

  const handleSetAgent = (id) => {
    clearInterval(typeTimer.current);
    setBusy(false); setWaiting(false); setAgentId(id);
  };

  const send = async () => {
    if (!input.trim() || busy || !agentId) return;
    const msg = input.trim();
    const aId = agentId;
    setInput(""); setBusy(true); setWaiting(true);

    const prev = convos[aId] || [];
    const next = [...prev, { role: "user", text: msg }];
    setConvos(c => ({ ...c, [aId]: next }));

    const topic = msg.length > 90 ? msg.slice(0, 87) + "..." : msg;
    setActivityLog(log => [...log, { agentId: aId, topic, day, t: timeIdx }].slice(-20));

    const ctx = { day, timeIdx, chronicle, activityLog, playerName: player };

    try {
      const reply = await fetchAgentReply({
        agentId: aId, history: prev, userMsg: msg, ctx, apiKey, model
      });

      setWaiting(false);
      setConvos(c => ({ ...c, [aId]: [...next, { role: "agent", text: "" }] }));

      let i = 0;
      clearInterval(typeTimer.current);
      typeTimer.current = setInterval(() => {
        i = Math.min(i + 8, reply.length);
        setConvos(c => {
          const arr = [...(c[aId] || [])];
          if (arr.length > 0) arr[arr.length - 1] = { role: "agent", text: reply.slice(0, i) };
          return { ...c, [aId]: arr };
        });
        if (i >= reply.length) { clearInterval(typeTimer.current); setBusy(false); }
      }, 16);

    } catch (err) {
      setWaiting(false);
      setBusy(false);
      setConvos(c => ({
        ...c,
        [aId]: [...next, { role: "agent", text: `⚠️ ${err.message}` }],
      }));
    }
  };

  if (phase === "apikey") {
    return <ApiKeyScreen onSubmit={({apiKey: k, model: m}) => { setApiKey(k); setModel(m); setPhase("intro"); }} />;
  }
  if (phase === "intro") {
    return <IntroScreen onStart={n => { setPlayer(n || "Yolcu"); setPhase("game"); }} />;
  }

  const loc   = LOCATIONS[locId];
  const ag    = agentId ? AGENT_META[agentId] : null;
  const convo = agentId ? (convos[agentId] || []) : [];

  return (
    <div style={{minHeight:"100vh",background:DARK,color:IVORY,fontFamily:"'EB Garamond',Georgia,serif",display:"flex",flexDirection:"column",fontSize:"16px"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
        *{box-sizing:border-box;} input,textarea{-webkit-appearance:none;}
        input::placeholder,textarea::placeholder{color:rgba(240,224,192,.22);}
        ::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:rgba(201,168,76,.22);border-radius:2px;}
        .lt{transition:all .15s;} .lt:hover{background:rgba(201,168,76,.12)!important;}
        .ac{transition:all .18s;} .ac:hover{background:rgba(255,255,255,.07)!important;transform:translateY(-1px);}
        .suggest-btn{transition:all .15s;}
        .suggest-btn:hover{background:rgba(201,168,76,.18)!important;border-color:rgba(201,168,76,.5)!important;color:rgba(240,224,192,.9)!important;}
        .send-btn{transition:all .15s;} .send-btn:hover:not(:disabled){opacity:.85;}
        .clock-btn{transition:all .2s;}
        .clock-btn:hover{background:rgba(201,168,76,.14)!important;border-color:rgba(201,168,76,.45)!important;}
        @keyframes think{0%,100%{opacity:.25;transform:scale(.85);}50%{opacity:1;transform:scale(1.15);}}
        .dot{display:inline-block;width:6px;height:6px;border-radius:50%;animation:think 1.2s ease-in-out infinite;}
        .dot:nth-child(2){animation-delay:.18s;} .dot:nth-child(3){animation-delay:.36s;}
        @keyframes fade-in{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
        .msg-in{animation:fade-in .3s ease both;}
        @keyframes ticker-fade{0%,100%{opacity:.6;}50%{opacity:1;}} .ticker{animation:ticker-fade 7s ease-in-out infinite;}
        @keyframes flash-pulse{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,.5);}50%{box-shadow:0 0 0 8px rgba(201,168,76,0);}}
        .flash{animation:flash-pulse 1.5s ease-in-out infinite;}
      `}</style>

      <div style={{padding:".55rem 1rem",borderBottom:`1px solid rgba(201,168,76,.16)`,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,gap:".5rem"}}>
        <div style={{minWidth:0,flex:1}}>
          <div style={{fontFamily:"'Cinzel Decorative',serif",fontSize:".73rem",color:GOLD,letterSpacing:".13em"}}>☽ İSTANBUL · 1550</div>

          <span style={{fontSize:".9rem"}}>{TIME_ICONS[timeIdx]}</span>
          <span>GÜN {day} · {TIME_LABELS[timeIdx].toUpperCase()}</span>
          {newEventFlash && <span style={{width:6,height:6,borderRadius:"50%",background:GOLD,marginLeft:".15rem"}}/>}

      </div>

      <div style={{display:"flex",overflowX:"auto",padding:".45rem .6rem",gap:".4rem",borderBottom:`1px solid rgba(201,168,76,.1)`,flexShrink:0,scrollbarWidth:"none"}}>
        {Object.values(LOCATIONS).map(l => {
          const active = l.id === locId;
          return (
            <button key={l.id} className="lt" onClick={() => { setLocId(l.id); handleSetAgent(null); }} style={{flex:"0 0 auto",padding:".32rem .62rem",background:active?"rgba(201,168,76,.18)":"transparent",border:`1px solid ${active?GOLD:"rgba(201,168,76,.16)"}`,borderRadius:20,color:active?GOLD:"rgba(240,224,192,.48)",fontSize:".7rem",cursor:"pointer",whiteSpace:"nowrap"}}>
              {l.emoji} {l.name}
            </button>
          );
        })}
      </div>

      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        {!agentId && (
          <div style={{flex:1,overflowY:"auto",padding:"1rem"}}>
            <div style={{textAlign:"center",marginBottom:"1.25rem",padding:"1.35rem 1rem",background:"rgba(255,255,255,.025)",border:`1px solid rgba(201,168,76,.12)`,borderRadius:8}}>
              <div style={{fontSize:"2.9rem",marginBottom:".4rem"}}>{loc.emoji}</div>
              <div style={{fontFamily:"'Cinzel Decorative',serif",fontSize:"1rem",color:GOLD,marginBottom:".2rem"}}>{loc.name}</div>
              <div style={{fontSize:".67rem",color:"rgba(201,168,76,.52)",letterSpacing:".13em",marginBottom:".9rem"}}>{loc.subtitle}</div>
              <p style={{color:"rgba(240,224,192,.62)",lineHeight:1.8,fontSize:".87rem",fontStyle:"italic",maxWidth:380,margin:"0 auto"}}>{loc.desc}</p>
            </div>
            <p style={{fontSize:".63rem",color:"rgba(201,168,76,.48)",letterSpacing:".15em",textTransform:"uppercase",marginBottom:".65rem"}}>Konuşabileceğiniz kişiler</p>
            <div style={{display:"flex",flexDirection:"column",gap:".65rem"}}>
              {loc.agents.map(aid => {
                const a   = AGENT_META[aid];
                const r   = rgb(a.accent);
                const has = (convos[aid]?.length ?? 0) > 0;
                return (
                  <button key={aid} className="ac" onClick={() => handleSetAgent(aid)} style={{display:"flex",alignItems:"center",gap:".85rem",padding:".9rem",cursor:"pointer",textAlign:"left",background:"rgba(255,255,255,.03)",border:`1px solid rgba(${r},.26)`,borderRadius:8,color:IVORY}}>
                    <div style={{width:46,height:46,borderRadius:"50%",flexShrink:0,background:`rgba(${r},.1)`,border:`2px solid rgba(${r},.42)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.4rem"}}>{a.emoji}</div>
                    <div style={{flex:1}}>
                      <div style={{fontFamily:"'Playfair Display',Georgia,serif",color:a.accent,fontSize:".94rem",marginBottom:".1rem"}}>{a.name}</div>
                      <div style={{fontSize:".71rem",color:"rgba(240,224,192,.42)",fontStyle:"italic"}}>{a.title}</div>
                      {has && <div style={{fontSize:".62rem",color:"rgba(201,168,76,.42)",marginTop:".22rem"}}>✦ Konuşma devam ediyor</div>}
                    </div>
                    <div style={{color:"rgba(201,168,76,.32)",fontSize:"1.1rem"}}>›</div>
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {agentId && ag && (
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:".55rem 1rem",flexShrink:0,borderBottom:`1px solid rgba(${rgb(ag.accent)},.18)`,background:`rgba(${rgb(ag.accent)},.04)`,display:"flex",alignItems:"center",gap:".7rem"}}>
              <button onClick={() => handleSetAgent(null)} style={{background:"transparent",border:"none",color:"rgba(240,224,192,.4)",cursor:"pointer",fontSize:"1.3rem",padding:0,lineHeight:1}}>‹</button>
              <div style={{width:34,height:34,borderRadius:"50%",flexShrink:0,background:`rgba(${rgb(ag.accent)},.12)`,border:`1px solid rgba(${rgb(ag.accent)},.42)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.15rem"}}>{ag.emoji}</div>
              <div style={{flex:1}}>
                <div style={{fontFamily:"'Playfair Display',serif",color:ag.accent,fontSize:".87rem"}}>{ag.name}</div>
                <div style={{fontSize:".61rem",color:"rgba(240,224,192,.36)",fontStyle:"italic"}}>{ag.title}</div>
              </div>
              {busy && waiting && (<div style={{fontSize:".58rem",color:`rgba(${rgb(ag.accent)},.6)`,letterSpacing:".06em",fontStyle:"italic"}}>düşünüyor...</div>)}
            </div>

            <div style={{flex:1,overflowY:"auto",padding:"1rem",display:"flex",flexDirection:"column",gap:".85rem"}}>
              {convo.length === 0 && !waiting && (
                <div style={{textAlign:"center",padding:"1.5rem .5rem"}}>
                  <div style={{color:"rgba(240,224,192,.32)",fontStyle:"italic",fontSize:".88rem",lineHeight:1.85,marginBottom:"1.25rem"}}>
                    {ag.name}'a yaklaşıyorsunuz.<br/>
                    <span style={{fontSize:".78rem",opacity:.7}}>Ne sormak istersiniz?</span>
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:".45rem",justifyContent:"center"}}>
                    {(AGENT_SUGGESTIONS[agentId] || []).map((s, i) => (
                      <button key={i} className="suggest-btn" onClick={() => setInput(s)} style={{padding:".38rem .78rem",background:"rgba(201,168,76,.07)",border:"1px solid rgba(201,168,76,.22)",borderRadius:20,color:"rgba(240,224,192,.58)",fontSize:".75rem",cursor:"pointer",fontStyle:"italic"}}>{s}</button>
                    ))}
                  </div>
                </div>
              )}
              {convo.map((msg, i) => (
                <div key={i} className="msg-in" style={{display:"flex",justifyContent:msg.role==="user"?"flex-end":"flex-start"}}>
                  {msg.role === "user" ? (
                    <div style={{maxWidth:"80%",padding:".55rem .88rem",background:"rgba(201,168,76,.12)",border:"1px solid rgba(201,168,76,.26)",borderRadius:"10px 10px 2px 10px",fontSize:".9rem",lineHeight:1.65,whiteSpace:"pre-wrap"}}>{msg.text}</div>
                  ) : (
                    <div style={{maxWidth:"90%",padding:".72rem .95rem",background:`rgba(${rgb(ag.accent)},.06)`,border:`1px solid rgba(${rgb(ag.accent)},.18)`,borderRadius:"2px 10px 10px 10px",fontSize:".9rem",lineHeight:1.82,whiteSpace:"pre-wrap"}}>
                      <div style={{fontSize:".58rem",color:ag.accent,letterSpacing:".1em",marginBottom:".38rem",opacity:.8}}>{ag.name.toUpperCase()}</div>
                      {msg.text}
                      {i === convo.length - 1 && busy && !waiting && (<span style={{display:"inline-block",width:2,height:"1em",background:ag.accent,marginLeft:2,verticalAlign:"text-bottom",animation:"think .8s ease-in-out infinite"}}/>)}
                    </div>
                  )}
                </div>
              ))}
              {waiting && (
                <div className="msg-in" style={{display:"flex",justifyContent:"flex-start"}}>
                  <div style={{padding:".65rem .95rem",background:`rgba(${rgb(ag.accent)},.06)`,border:`1px solid rgba(${rgb(ag.accent)},.16)`,borderRadius:"2px 10px 10px 10px",display:"flex",alignItems:"center",gap:".3rem"}}>
                    <span style={{fontSize:".58rem",color:ag.accent,letterSpacing:".1em",marginRight:".4rem",opacity:.7}}>{ag.name.toUpperCase()}</span>
                    <span className="dot" style={{background:ag.accent}}/><span className="dot" style={{background:ag.accent}}/><span className="dot" style={{background:ag.accent}}/>
                  </div>
                </div>
              )}
              <div ref={chatEnd}/>
            </div>

            <div style={{padding:".65rem .85rem",borderTop:`1px solid rgba(201,168,76,.1)`,background:"rgba(0,0,0,.38)",flexShrink:0,display:"flex",gap:".5rem",alignItems:"flex-end"}}>
              <textarea value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }}} placeholder={busy ? "" : "Söyleyin..."} disabled={busy} rows={2} style={{flex:1,padding:".5rem .78rem",background:"rgba(201,168,76,.05)",border:"1px solid rgba(201,168,76,.16)",borderRadius:6,color:IVORY,fontFamily:"Georgia,serif",fontSize:".88rem",resize:"none",outline:"none",lineHeight:1.52}}/>
              <button className="send-btn" onClick={send} disabled={busy || !input.trim()} style={{padding:".5rem 1.1rem",height:"fit-content",background:(!busy&&input.trim())?"rgba(201,168,76,.9)":"rgba(201,168,76,.16)",border:"none",borderRadius:6,color:DARK,fontWeight:"bold",cursor:(!busy&&input.trim())?"pointer":"not-allowed",fontSize:"1.1rem"}}>›</button>
            </div>
          </div>
        )}
      </div>

      <div className="ticker" style={{padding:".44rem 1rem",flexShrink:0,borderTop:`1px solid rgba(201,168,76,.07)`,background:"rgba(0,0,0,.52)",fontSize:".7rem",color:"rgba(201,168,76,.58)",fontStyle:"italic",textAlign:"center",minHeight:33,display:"flex",alignItems:"center",justifyContent:"center"}}>
        {EVENTS[evIdx]}
      </div>

      <ChroniclePanel open={chronicleOpen} onClose={() => setChronicleOpen(false)} day={day} timeIdx={timeIdx} chronicle={chronicle} activityLog={activityLog} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
