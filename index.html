function rgb(hex) {
  const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return r ? `${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}` : "201,168,76";
}
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// Apply deltas to relationship matrix
function applyMatrixDeltas(matrix, deltas) {
  // deltas: { "A->B": { guven:+1, saygi:0, suphe:-1 }, "rustem->user": {...} }
  const m = JSON.parse(JSON.stringify(matrix));
  Object.entries(deltas || {}).forEach(([key, vals]) => {
    const [from, to] = key.split("->").map(s=>s.trim());
    if (!from || !to) return;
    if (to === "user") {
      m.user = m.user || {};
      m.user[from] = m.user[from] || { guven:0, saygi:0, suphe:0 };
      ["guven","saygi","suphe"].forEach(k => {
        if (typeof vals[k] === "number") m.user[from][k] = clampScore(m.user[from][k] + vals[k]);
      });
    } else {
      m[from] = m[from] || {};
      m[from][to] = m[from][to] || { guven:0, saygi:0, suphe:0 };
      ["guven","saygi","suphe"].forEach(k => {
        if (typeof vals[k] === "number") m[from][to][k] = clampScore(m[from][to][k] + vals[k]);
      });
    }
  });
  return m;
}

// Apply effects to ahval card(s)
function applyAhvalEffects(ahval, effects) {
  // effects: { suleiman: { egilimler:{melankoli:+2}, yukler:["x"], saglik:"aksak" }, ... }
  const a = JSON.parse(JSON.stringify(ahval));
  Object.entries(effects || {}).forEach(([char, eff]) => {
    if (!a[char]) return;
    if (eff.egilimler) {
      Object.entries(eff.egilimler).forEach(([k,v]) => {
        a[char].egilimler[k] = clamp((a[char].egilimler[k] || 0) + v, 0, 5);
      });
    }
    if (eff.yukler) {
      eff.yukler.forEach(y => { if (!a[char].yukler.includes(y)) a[char].yukler.push(y); });
    }
    if (eff.saglik) a[char].saglik = eff.saglik;
    if (eff.ruhHali) {
      a[char].sonRuhHali = [eff.ruhHali, ...(a[char].sonRuhHali || [])].slice(0, 3);
    }
  });
  return a;
}

// Time-based natural drift (her oyun günü çağrılır)
function uygulaDogalSurukleme(ahval, day) {
  const a = JSON.parse(JSON.stringify(ahval));
  // Her 6 günde bir (gerçek hayatta ~6 ay), Süleyman'ın sufizmi/yorgunluğu artar
  if (day > 1 && day % 6 === 0) {
    if (a.suleiman) {
      a.suleiman.egilimler.sufizm = clamp((a.suleiman.egilimler.sufizm || 0) + 1, 0, 5);
      a.suleiman.egilimler.yorgunluk = clamp((a.suleiman.egilimler.yorgunluk || 0) + 1, 0, 5);
    }
    if (a.hurrem) {
      a.hurrem.egilimler.taht_kaygisi = clamp((a.hurrem.egilimler.taht_kaygisi || 0) + 1, 0, 5);
    }
  }
  return a;
}

// Karakter inisiyatifi kontrolü — eşik 3
function karakterInisiyatifi(ahval, silinmis, sonInisiyatif) {
  const sahneler = [];
  Object.entries(ahval).forEach(([char, kart]) => {
    if (silinmis.includes(char)) return;
    if (sonInisiyatif[char] && sonInisiyatif[char] > 0) return; // cooldown
    const eg = kart.egilimler || {};
    // şüphecilik/taht_kaygısı/melankoli eşiği 3
    if ((eg.suphecilik || eg.kuskuculuk) >= 3) {
      sahneler.push({ char, sebep:"suphe", tip:"şüphe_konuşması" });
    } else if (eg.taht_kaygisi >= 3) {
      sahneler.push({ char, sebep:"taht_kaygisi", tip:"siyasî_arz" });
    } else if (eg.melankoli >= 3) {
      sahneler.push({ char, sebep:"melankoli", tip:"itiraf_anı" });
    } else if ((kart.yukler || []).length > 0) {
      sahneler.push({ char, sebep:"yük", tip:"yüzleşme" });
    }
  });
  return sahneler;
}

// Söylenti yayılma kontrolü
function soylentiYayilir(rumor, matrix, ahval) {
  const { source, toldTo, about, sensitivity } = rumor;
  if (!matrix[toldTo]) return false;
  const guvenToldToFromSource = source === "user"
    ? ((matrix.user || {})[toldTo] || {}).guven || 0
    : (matrix[toldTo][source] || {}).guven || 0;
  const guvenToldToAbout = (matrix[toldTo][about] || {}).guven || 0;
  const gossipTrend = GOSSIP_EGILIM[toldTo] || 0;
  if (guvenToldToFromSource <= 0) return false;
  if (guvenToldToAbout >= 3) return false;
  if (sensitivity < 2) return false;
  if (gossipTrend <= -1) return false;
  return true;
}

// Matris özeti — API promptuna ekleneck
function buildMatrisOzet(matrix, agentId) {
  const lines = [];
  const myView = matrix[agentId] || {};
  Object.entries(myView).forEach(([target, r]) => {
    const tName = AGENT_META[target]?.name || target;
    lines.push(`  ${tName}: güven ${r.guven>=0?"+":""}${r.guven}, saygı ${r.saygi>=0?"+":""}${r.saygi}, şüphe ${r.suphe>=0?"+":""}${r.suphe}`);
  });
  const userView = (matrix.user || {})[agentId];
  if (userView) {
    lines.push(`  KULLANICI'ya: güven ${userView.guven>=0?"+":""}${userView.guven}, saygı ${userView.saygi>=0?"+":""}${userView.saygi}, şüphe ${userView.suphe>=0?"+":""}${userView.suphe}`);
  }
  return lines.length ? lines.join("\n") : "  (henüz belirgin bir ilişki kaydı yok)";
}

// Ahval kartı özeti
function buildAhvalOzet(kart) {
  if (!kart) return "  (henüz iz yok)";
  const eg = Object.entries(kart.egilimler || {}).filter(([_,v])=>v>0).map(([k,v])=>`${k}:${v}`).join(", ");
  return `  Yaş: ${kart.yas}. Sağlık: ${kart.saglik}.\n  Son ruh hâlleri: ${(kart.sonRuhHali||[]).join(", ") || "—"}.\n  Eğilimler: ${eg || "—"}.\n  Taşıdığın yükler: ${(kart.yukler||[]).join(", ") || "—"}.`;
}

function buildSystemPrompt(agentId, ctx) {
  const base = AGENT_PROMPTS[agentId] || "";
  const { day, timeIdx, chronicle, activityLog, playerName, playerRole, linkContext, matrix, ahval, pendingRumors } = ctx;
  const myEvents = chronicle.filter(e => e.agents.includes("all") || e.agents.includes(agentId)).slice(0, 8);
  const otherActivity = activityLog.filter(a => a.agentId !== agentId).slice(-6);

  let ctxBlock = `\n\n──── ŞU AN ────\nOyun günü ${day} (${gameDateTr(day)}) · ${TIME_LABELS[timeIdx]} ${TIME_ICONS[timeIdx]} · İstanbul`;

  const roleAddressing = getRoleAddressing(agentId, playerRole);
  ctxBlock += `\n\n──── KULLANICI KİMLİĞİ ────\n${roleAddressing}`;
  ctxBlock += `\nKullanıcının adı: ${playerName}`;

  // FAZ 3 — Ahval kartı
  if (ahval && ahval[agentId]) {
    ctxBlock += `\n\n──── KENDİ AHVALİN ────\n${buildAhvalOzet(ahval[agentId])}\nBu hâli açıkça söyleme; oradan konuş.`;
  }

  // FAZ 3 — İlişki kartı
  if (matrix) {
    ctxBlock += `\n\n──── İLİŞKİ KARTIN (-3..+3) ────\n${buildMatrisOzet(matrix, agentId)}\nBu skorlar tonunu etkilesin; rakamları sayma.`;
  }

  // FAZ 3 — Bekleyen söylentiler (bu karaktere ulaşmış)
  if (pendingRumors && pendingRumors.length > 0) {
    ctxBlock += `\n\n──── KULAĞINA ÇALINANLAR ────`;
    pendingRumors.forEach(r => {
      const aboutName = r.about === "user" ? playerName : (AGENT_META[r.about]?.name || r.about);
      ctxBlock += `\n· ${aboutName} hakkında: "${r.claim}"`;
    });
    ctxBlock += `\nBunları açıkça söyleme; tonun bunlardan etkilensin.`;
  }

  if (myEvents.length > 0) {
    ctxBlock += `\n\n──── SON OLAYLAR (haberdar olduklarınız) ────`;
    myEvents.forEach(e => { ctxBlock += `\n· (G${e.day}-${TIME_LABELS[e.t][0]}) ${e.text}`; });
  }

  if (otherActivity.length > 0) {
    ctxBlock += `\n\n──── SARAY KULAĞI (${playerName} hakkında işitilenler) ────`;
    otherActivity.forEach(a => {
      const otherName = AGENT_META[a.agentId]?.name || "biri";
      ctxBlock += `\n· ${playerName}, ${otherName} ile şunu konuştu: "${a.topic}"`;
    });
  }

  if (linkContext) {
    ctxBlock += `\n\n──── KULLANICININ PAYLAŞTIĞI KAYNAK ────\n"${linkContext}"\n\nBu kaynağa kendi 1550 perspektifinden tepki ver. Modern akademik bir metinse, "ileride yazılmış gibi" deyip alay etmeden ciddî ele alabilirsin.`;
  }

  return base + TEACHING_DIRECTIVE + ctxBlock;
}

// ──────────────────────────────────────────────────────────────────────────────
// ── API CALLS ─────────────────────────────────────────────────────────────────
// ──────────────────────────────────────────────────────────────────────────────
async function fetchAgentReply(agentId, history, userMsg, ctx) {
  const apiMessages = history.map(m => ({
    role: m.role === "user" ? "user" : "assistant",
    content: m.text,
  }));
  apiMessages.push({ role: "user", content: userMsg });

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": ctx.apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: ctx.model || "claude-sonnet-4-5-20250929",
      max_tokens: 1200,
      system: buildSystemPrompt(agentId, ctx),
      messages: apiMessages,
    }),
  });
  if (!res.ok) {
    const errText = await res.text();
    let msg;
    try { msg = JSON.parse(errText)?.error?.message || errText; }
    catch { msg = errText || `HTTP ${res.status}`; }
    throw new Error(msg);
  }
  const data = await res.json();
  return data.content?.[0]?.text || "...";
}

// Faz 3 — Bağlama göre dinamik seçenek üretici
async function generateChoices(sceneCtx, ctx) {
  const { senaryo, sahneHafiza } = sceneCtx;
  const sahneMetni = sahneHafiza.map(m => {
    const ad = m.speaker === "user" ? ctx.playerName : (AGENT_META[m.speaker]?.name || m.speaker);
    return `${ad}: ${m.text}`;
  }).join("\n\n");

  const sistem = `Sen Osmanlı tarihi yaşayan-tarih oyununda bir 'sahne yönetmenisin'. Aşağıdaki sahnede şu ana kadar konuşulanlardan yola çıkarak, kullanıcının (Osmanlı sarayında bir kâtip/iç oğlanı/refakatçi rolünde) sahneye söyleyebileceği 2-3 makul niyet/yanıt üret.

Cevabını YALNIZCA JSON olarak ver:
{
  "choices": [
    {
      "text": "<kullanıcının ağzından söylenebilecek kısa bir niyet/söz (1-2 cümle)>",
      "ton": "<saygılı | sert | ihtiyatlı | cüretkâr | duygusal | kurnaz>",
      "effects": {
        "<karakter_id>->user": { "guven": <-2..+2>, "saygi": <-2..+2>, "suphe": <-2..+2> }
      },
      "flags": ["<gizli niyet/ahval işareti, ör: ahlâkî_kompromi>"]
    }
  ]
}

Geçerli karakter id'leri: ${Object.keys(AGENT_META).join(", ")}
'user' kullanıcının kendisidir.
Skorlar -3..+3 aralığında tutulur; tek bir seçim genellikle 1-2 birimlik etki yapar, dramatik seçimler 3'e kadar gidebilir.
2-3 seçenek üret; her biri farklı bir tona ve farklı sonuca yönlendirsin. JSON dışında hiçbir şey yazma, ön söz ekleme.`;

  const kullanici = `SAHNE: ${senaryo.baslik}
KONU: ${senaryo.metin}

ŞU ANA KADAR KONUŞULAN:
${sahneMetni}

YÖNERGE: ${senaryo.yonerge || ""}
ETKİ İPUCU: ${senaryo.etki_ipucu || ""}`;

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key":ctx.apiKey,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true",
    },
    body: JSON.stringify({
      model: ctx.model || "claude-sonnet-4-5-20250929",
      max_tokens: 800,
      system: sistem,
      messages: [{ role:"user", content: kullanici }],
    }),
  });
  if (!res.ok) {
    const t = await res.text();
    throw new Error(`Seçenek üretimi hatası: ${t.slice(0,200)}`);
  }
  const data = await res.json();
  const raw = data.content?.[0]?.text || "{}";
  const clean = raw.replace(/```json|```/g, "").trim();
  try { return JSON.parse(clean); }
  catch { return { choices: [{ text:"(seçenek üretilemedi, kendi cümlenle yaz)", ton:"nötr", effects:{}, flags:[] }] }; }
}

// Faz 3 — Çoklu karakter sahnesi: tek soru → her karakter sırayla cevap
async function multiCharacterTurn(characters, sahneHafiza, userMsg, sceneCtx, ctx) {
  const replies = [];
  let localHafiza = [...sahneHafiza, { speaker:"user", text:userMsg }];
  for (const charId of characters) {
    const sistem = `${AGENT_PROMPTS[charId] || ""}${TEACHING_DIRECTIVE}

──── ŞU AN ────
Oyun günü ${ctx.day} (${gameDateTr(ctx.day)}). ${TIME_LABELS[ctx.timeIdx]}.

──── SAHNE ────
${sceneCtx.senaryo ? sceneCtx.senaryo.baslik + " — " + sceneCtx.senaryo.metin : "Çoklu karakter sahnesi (Divan ya da olay)."}

──── BU SAHNEDE SİZİNLE OLANLAR ────
${characters.filter(c => c !== charId).map(c => "- " + (AGENT_META[c]?.name || c)).join("\n") || "- (sadece sen)"}

──── KULLANICI KİMLİĞİ ────
${getRoleAddressing(charId, ctx.playerRole)}
Kullanıcının adı: ${ctx.playerName}

${ctx.ahval && ctx.ahval[charId] ? "──── KENDİ AHVALİN ────\n" + buildAhvalOzet(ctx.ahval[charId]) : ""}

${ctx.matrix ? "──── İLİŞKİ KARTIN ────\n" + buildMatrisOzet(ctx.matrix, charId) : ""}

──── SAHNEDE ŞU ANA KADAR KONUŞULAN ────
${localHafiza.map(m => {
  const ad = m.speaker === "user" ? ctx.playerName : (AGENT_META[m.speaker]?.name || m.speaker);
  return ad + ": " + m.text;
}).join("\n\n")}

YÖNERGE: Yalnızca kendi karakterin olarak konuş. Diğer karakterlerin sözlerini duymuş gibi davran ve gerekirse onlara da gönderme yap. Kısa kalmaya çalış (1-3 paragraf). Modern dil kullanma; 1550 saray Türkçesine yakın bir üslupla konuş.`;

    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":ctx.apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true",
      },
      body: JSON.stringify({
        model: ctx.model || "claude-sonnet-4-5-20250929",
        max_tokens: 700,
        system: sistem,
        messages: [{ role:"user", content: userMsg }],
      }),
    });
    if (!res.ok) {
      const t = await res.text();
      replies.push({ speaker: charId, text: "(cevap alınamadı: " + t.slice(0,80) + ")" });
      continue;
    }
    const data = await res.json();
    const txt = data.content?.[0]?.text || "...";
    replies.push({ speaker: charId, text: txt });
    localHafiza.push({ speaker: charId, text: txt });
  }
  return { replies, sahneHafiza: localHafiza };
}

function generateNotifications(day, timeIdx, role, alreadySent) {
  const key = `${day}-${timeIdx}-${role}`;

  const notes = [];
  if (role === "yolcu") return [];
  if (role === "suleiman") {
    if (timeIdx === 0) notes.push({ id:key+"-div", from:"rustem", title:"Divan Toplandı", body:"Sultanım, Divan-ı Hümayun toplandı. Vezirler, defterdar ve kazaskerlerle birlikte arz beklenmektedir.", action:{ type:"divan", locId:"topkapi", agents:["rustem","ebussuud"] } });
    if (day >= 2 && timeIdx === 1) notes.push({ id:key+"-fet", from:"ebussuud", title:"Şeyhülislam'dan Arz", body:"Devletlü Sultanım, sefer mevzusunda fetva hazırlanması arz olunmuştur.", action:{ type:"goto", locId:"topkapi", agentId:"ebussuud" } });
    if (timeIdx === 2) notes.push({ id:key+"-sin", from:"sinan", title:"Süleymaniye'den Rapor", body:"Hünkârım, Süleymaniye inşaatından arzım var.", action:{ type:"goto", locId:"mosque", agentId:"sinan" } });
  }
  if (role === "rustem") {
    if (timeIdx === 0) notes.push({ id:key+"-divr", from:"suleiman", title:"Padişah Divan'a Çağırıyor", body:"Sadrazamım, Divan'da arz beklenmektedir.", action:{ type:"goto", locId:"topkapi", agentId:"suleiman" } });
    if (day >= 2 && timeIdx === 1) notes.push({ id:key+"-yus", from:"yusuf", title:"Çarşıdan Şikâyet", body:"Paşam, sarrafın dükkanına hırsız girdi, çarşıda huzursuzluk var.", action:{ type:"goto", locId:"bazaar", agentId:"yusuf" } });
  }
  if (role === "hurrem") {
    if (timeIdx === 1) notes.push({ id:key+"-est", from:"ester", title:"Ester Kira Geldi", body:"Haseki Sultanım, Ester sizi görmek istiyor. Polonya'dan getirdiği kumaşlar ve mektuplar var.", action:{ type:"goto", locId:"bazaar", agentId:"ester" } });
    if (day >= 2 && timeIdx === 2) notes.push({ id:key+"-mih", from:"mihrimah", title:"Mihrimah'tan Mektup", body:"Anne, Üsküdar inşaatından bahsetmek istiyorum.", action:{ type:"goto", locId:"uskudar", agentId:"mihrimah" } });
  }
  if (role === "sinan") {
    if (timeIdx === 1) notes.push({ id:key+"-pad", from:"suleiman", title:"Padişah'tan İrade", body:"Üstad, Süleymaniye'nin son durumunu arz etmenizi rica ederim.", action:{ type:"goto", locId:"topkapi", agentId:"suleiman" } });
  }
  if (role === "mihrimah") {
    if (timeIdx === 0) notes.push({ id:key+"-rus", from:"rustem", title:"Eşinden Haber", body:"Sultanım, akşam evde sizi bekleyeceğim.", action:{ type:"goto", locId:"topkapi", agentId:"rustem" } });
  }
  if (role === "mustafa") {
    if (timeIdx === 1) notes.push({ id:key+"-meh", from:"mehmed", title:"Yeniçeri Bağlılığı", body:"Şehzadem, Yeniçeri Ocağı'ndan size selâm vardır.", action:{ type:"goto", locId:"barracks", agentId:"mehmed" } });
  }
  return notes;
}

                  <div style={{display:"flex",alignItems:"center",gap:".5rem",marginBottom:".4rem"}}>
                    <span style={{fontSize:"1rem"}}>{from?.emoji}</span>
                    <span style={{color:from?.accent,fontSize:".82rem",fontWeight:600}}>{from?.name}</span>
                    {isScenario && <span style={{fontSize:".62rem",color:CRIMSON,background:`rgba(${rgb(CRIMSON)},.18)`,padding:".15rem .45rem",borderRadius:3,letterSpacing:".05em"}}>OLAY</span>}
                    {isDivan && <span style={{fontSize:".62rem",color:GOLD,background:`rgba(${rgb(GOLD)},.18)`,padding:".15rem .45rem",borderRadius:3,letterSpacing:".05em"}}>DİVAN</span>}
                    {!m.read && <span style={{width:7,height:7,borderRadius:"50%",background:from?.accent,marginLeft:"auto"}}/>}
                  </div>
                  <div style={{fontSize:".88rem",color:IVORY,marginBottom:".3rem",fontWeight:600}}>{m.title}</div>
                  <div style={{fontSize:".82rem",color:"rgba(240,224,192,.65)",lineHeight:1.6}}>{m.body}</div>
                  {m.action && <div style={{marginTop:".55rem",fontSize:".72rem",color:from?.accent,fontStyle:"italic"}}>→ Tıklayın, yanıt verin</div>}
                </div>
              );
            })
          )}
        </div>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────────
// ── PANEL: İLİŞKİ MATRİSİ ────────────────────────────────────────────────────
// ──────────────────────────────────────────────────────────────────────────────
function MatrisPanel({ open, onClose, matrix, ahval, silinmis, day }) {
  if (!open) return null;
  const aktifKarakterler = Object.keys(AGENT_META).filter(k => !silinmis.includes(k));
  function dot(val) {
    if (val >= 2) return <span style={{color:"#27ae60"}}>●●●</span>;
    if (val >= 1) return <span style={{color:"#27ae60"}}>●●</span>;
    if (val === 0) return <span style={{color:"rgba(240,224,192,.4)"}}>●</span>;
    if (val === -1) return <span style={{color:"#c0392b"}}>●●</span>;
    return <span style={{color:"#c0392b"}}>●●●</span>;
  }
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
      <div onClick={e=>e.stopPropagation()} style={{maxWidth:760,width:"100%",maxHeight:"90vh",background:`linear-gradient(160deg,#15151f 0%,${DARK} 100%)`,border:`1px solid rgba(201,168,76,.3)`,borderRadius:8,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"1rem 1.25rem",borderBottom:`1px solid rgba(201,168,76,.15)`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontFamily:"'Cinzel Decorative',serif",color:GOLD,fontSize:"1rem"}}>🕸️ Saray Münasebetleri</div>
            <div style={{fontSize:".7rem",color:"rgba(240,224,192,.5)",fontStyle:"italic",marginTop:".15rem"}}>{gameDateTr(day)}</div>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"1px solid rgba(201,168,76,.25)",color:"rgba(240,224,192,.6)",borderRadius:4,padding:".3rem .7rem",cursor:"pointer",fontSize:".82rem",fontFamily:"inherit"}}>kapat</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"1rem 1.25rem"}}>
          <div style={{fontSize:".68rem",color:"rgba(201,168,76,.6)",letterSpacing:".15em",textTransform:"uppercase",marginBottom:".75rem"}}>Sizi (kullanıcı) nasıl görüyorlar?</div>
          {aktifKarakterler.map(k => {
            const userView = (matrix.user || {})[k];
            if (!userView || (userView.guven === 0 && userView.saygi === 0 && userView.suphe === 0)) return null;
            const meta = AGENT_META[k];
            return (
              <div key={"u-"+k} style={{display:"grid",gridTemplateColumns:"1fr auto auto auto",gap:".5rem",padding:".55rem .75rem",marginBottom:".35rem",background:`rgba(${rgb(meta.accent)},.06)`,border:`1px solid rgba(${rgb(meta.accent)},.18)`,borderRadius:4,fontSize:".8rem",alignItems:"center"}}>
                <span style={{color:meta.accent}}>{meta.emoji} {meta.name}</span>
                <span title={"güven: "+userView.guven}>güven {dot(userView.guven)}</span>
                <span title={"saygı: "+userView.saygi}>saygı {dot(userView.saygi)}</span>
                <span title={"şüphe: "+userView.suphe}>şüphe {dot(userView.suphe)}</span>
              </div>
            );
          })}
          <div style={{fontSize:".68rem",color:"rgba(201,168,76,.6)",letterSpacing:".15em",textTransform:"uppercase",margin:"1.4rem 0 .75rem 0"}}>Karakterler arası</div>
          {aktifKarakterler.map(k => {
            const myView = matrix[k];
            if (!myView) return null;
            const targets = Object.entries(myView).filter(([t]) => aktifKarakterler.includes(t));
            if (targets.length === 0) return null;
            const meta = AGENT_META[k];
            return (
              <div key={"r-"+k} style={{marginBottom:".9rem"}}>
                <div style={{fontSize:".78rem",color:meta.accent,marginBottom:".35rem",fontWeight:600}}>{meta.emoji} {meta.name} → </div>
                {targets.map(([t, r]) => {
                  const tMeta = AGENT_META[t];
                  return (
                    <div key={k+t} style={{display:"grid",gridTemplateColumns:"1fr auto auto auto",gap:".5rem",padding:".4rem .75rem",marginBottom:".25rem",background:"rgba(255,255,255,.02)",borderRadius:4,fontSize:".78rem",alignItems:"center"}}>
                      <span style={{color:"rgba(240,224,192,.7)",paddingLeft:"1rem"}}>↳ {tMeta?.name || t}</span>
                      <span>güven {dot(r.guven)}</span>
                      <span>saygı {dot(r.saygi)}</span>
                      <span>şüphe {dot(r.suphe)}</span>
                    </div>
                  );
                })}
              </div>
            );
          })}
          <div style={{fontSize:".68rem",color:"rgba(201,168,76,.6)",letterSpacing:".15em",textTransform:"uppercase",margin:"1.4rem 0 .75rem 0"}}>Ahval kartları</div>
          {aktifKarakterler.map(k => {
            const kart = ahval[k];
            if (!kart) return null;
            const meta = AGENT_META[k];
            const aktifEg = Object.entries(kart.egilimler || {}).filter(([_,v])=>v>0);
            return (
              <div key={"a-"+k} style={{padding:".5rem .75rem",marginBottom:".3rem",background:`rgba(${rgb(meta.accent)},.04)`,borderLeft:`2px solid rgba(${rgb(meta.accent)},.4)`,fontSize:".76rem",color:"rgba(240,224,192,.75)"}}>
                <span style={{color:meta.accent,fontWeight:600}}>{meta.emoji} {meta.name}</span>
                <span style={{color:"rgba(240,224,192,.5)"}}> · {kart.yas} yaş · {kart.saglik}</span>
                {aktifEg.length > 0 && (
                  <div style={{marginTop:".2rem",fontStyle:"italic",fontSize:".72rem",opacity:.85}}>
                    {aktifEg.map(([n,v])=>n+" "+v).join(" · ")}
                  </div>
                )}
                {(kart.yukler||[]).length > 0 && (
                  <div style={{marginTop:".2rem",fontSize:".72rem",color:GOLD,opacity:.8}}>
                    yük: {kart.yukler.join(", ")}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────────
// ── MODAL: SENARYO SAHNESİ (BEKLENMEYEN OLAY) ────────────────────────────────
// ──────────────────────────────────────────────────────────────────────────────
function SenaryoModal({ open, senaryo, onClose, onTamamla, ctx }) {
  const [sahneHafiza, setSahneHafiza] = useState([]);
  const [choices, setChoices] = useState([]);
  const [busy, setBusy] = useState(false);
  const [customInput, setCustomInput] = useState("");
  const [turn, setTurn] = useState(0);
  const [error, setError] = useState(null);
  const sonuneRef = useRef(null);

  useEffect(() => {
    if (open && senaryo) {
      const acilis = (senaryo.acilis || []).map(a => ({ speaker:a.speaker, text:a.text, isOpening:true }));
      setSahneHafiza(acilis);
      setChoices([]);
      setTurn(0);
      setError(null);
      setCustomInput("");
      ilkSecenekUret(acilis);
    }
  }, [open, senaryo?.id]);

  useEffect(() => { sonuneRef.current?.scrollIntoView({ behavior:"smooth" }); }, [sahneHafiza, choices, busy]);

  async function ilkSecenekUret(hafizaInit) {
    setBusy(true);
    try {
      const r = await generateChoices({ senaryo, sahneHafiza: hafizaInit }, ctx);
      setChoices(r.choices || []);
    } catch (e) { setError(e.message || "seçenek üretilemedi"); }
    setBusy(false);
  }

  async function yanitGonder(text, secimEtkileri, secimFlags) {
    if (!text.trim()) return;
    setBusy(true);
    setError(null);
    setChoices([]);
    const userMsg = text.trim();
    try {
      const r = await multiCharacterTurn(senaryo.karakterler, sahneHafiza, userMsg, { senaryo }, ctx);
      const yeniHafiza = [...sahneHafiza, { speaker:"user", text:userMsg }, ...r.replies];
      setSahneHafiza(yeniHafiza);
      const yeniTur = turn + 1;
      setTurn(yeniTur);
      if (yeniTur < 4) {
        const cr = await generateChoices({ senaryo, sahneHafiza: yeniHafiza }, ctx);
        setChoices(cr.choices || []);
      } else {
        setChoices([]); // sahne tamamlandı
      }
      // Seçim etkileri sahne bitiminde uygulanır; etkileri biriktir
      if (secimEtkileri || secimFlags) {
        onTamamla({ partial:true, etki: secimEtkileri || {}, flags: secimFlags || [] });
      }
    } catch (e) { setError(e.message || "cevap alınamadı"); }
    setBusy(false);
  }

  function sahneyiKapat(bitiriliyor) {
    onTamamla({ partial:false, tamamlandi:bitiriliyor });
    onClose();
  }

  if (!open || !senaryo) return null;

  return (
    <div style={{position:"fixed",inset:0,background:`linear-gradient(180deg, rgba(0,0,0,.92) 0%, rgba(13,13,26,.96) 100%)`,zIndex:300,display:"flex",flexDirection:"column",padding:"1rem"}}>
      <style>{`
        @keyframes scene-in{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
        .scene-bubble{animation:scene-in .35s ease both;}
        .scene-choice:hover{transform:translateX(3px);background:rgba(201,168,76,.12)!important;}
        .scene-choice{transition:all .15s;}
      `}</style>
      <div style={{maxWidth:780,width:"100%",margin:"0 auto",flex:1,display:"flex",flexDirection:"column",background:"rgba(21,21,31,.6)",border:`1px solid rgba(201,168,76,.25)`,borderRadius:8,overflow:"hidden"}}>
        <div style={{padding:"1rem 1.4rem",borderBottom:`1px solid rgba(201,168,76,.2)`,background:`linear-gradient(135deg, rgba(122,21,21,.15) 0%, rgba(201,168,76,.05) 100%)`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontFamily:"'Cinzel Decorative',serif",color:GOLD,fontSize:"1.05rem",letterSpacing:".05em"}}>🎭 {senaryo.baslik}</div>
            <div style={{fontSize:".72rem",color:"rgba(240,224,192,.55)",fontStyle:"italic",marginTop:".15rem"}}>{gameDateTr(ctx.day)} · {LOCATIONS[senaryo.konum]?.name} · Tur {turn+1}/4</div>
          </div>
          <button onClick={()=>sahneyiKapat(false)} style={{background:"transparent",border:"1px solid rgba(201,168,76,.3)",color:"rgba(240,224,192,.65)",borderRadius:4,padding:".35rem .8rem",cursor:"pointer",fontSize:".78rem",fontFamily:"inherit"}}>sahneden çık</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"1.25rem 1.4rem"}}>
          <div style={{padding:".85rem 1rem",background:"rgba(201,168,76,.05)",border:"1px solid rgba(201,168,76,.18)",borderRadius:6,marginBottom:"1.2rem",fontSize:".85rem",color:"rgba(240,224,192,.78)",lineHeight:1.7,fontStyle:"italic"}}>
            {senaryo.metin}
          </div>
          {sahneHafiza.map((m, i) => {
            const isUser = m.speaker === "user";
            const meta = AGENT_META[m.speaker];
            const speakerName = isUser ? (ctx.playerName || "Sen") : (meta?.name || m.speaker);
            const accent = isUser ? GOLD : (meta?.accent || GOLD);
            const emoji = isUser ? "🧭" : (meta?.emoji || "·");
            return (
              <div key={i} className="scene-bubble" style={{marginBottom:".8rem",display:"flex",flexDirection:isUser?"row-reverse":"row",gap:".6rem",alignItems:"flex-start"}}>
                <div style={{flexShrink:0,fontSize:"1.4rem",marginTop:".15rem"}}>{emoji}</div>
                <div style={{maxWidth:"82%",padding:".7rem .95rem",background:isUser?`rgba(${rgb(GOLD)},.08)`:`rgba(${rgb(accent)},.06)`,border:`1px solid rgba(${rgb(accent)},.22)`,borderRadius:6}}>
                  <div style={{fontSize:".7rem",color:accent,marginBottom:".25rem",fontWeight:600,letterSpacing:".02em"}}>{speakerName}{m.isOpening && <span style={{color:"rgba(240,224,192,.4)",marginLeft:".4rem",fontStyle:"italic",fontWeight:400}}>· açılış</span>}</div>
                  <div style={{fontSize:".88rem",color:IVORY,lineHeight:1.65,whiteSpace:"pre-wrap"}}>{m.text}</div>
                </div>
              </div>
            );
          })}
          {busy && (
            <div style={{padding:".6rem 1rem",color:"rgba(201,168,76,.6)",fontSize:".82rem",fontStyle:"italic"}}>
              <span className="scene-bubble">karakter cevap veriyor...</span>
            </div>
          )}
          {error && (
            <div style={{padding:".7rem 1rem",background:"rgba(192,57,43,.12)",border:"1px solid rgba(192,57,43,.3)",borderRadius:4,color:"#e74c3c",fontSize:".82rem",marginBottom:".8rem"}}>{error}</div>
          )}
          <div ref={sonuneRef}/>
        </div>
        {turn < 4 ? (
          <div style={{borderTop:`1px solid rgba(201,168,76,.18)`,padding:"1rem 1.4rem",background:"rgba(0,0,0,.3)"}}>
            {choices.length > 0 && !busy && (
              <div style={{marginBottom:".75rem"}}>
                <div style={{fontSize:".66rem",color:"rgba(201,168,76,.7)",letterSpacing:".15em",textTransform:"uppercase",marginBottom:".5rem"}}>Yanıt önerileri</div>
                {choices.map((c, i) => (
                  <div key={i} className="scene-choice" onClick={()=>yanitGonder(c.text, c.effects, c.flags)} style={{padding:".55rem .85rem",marginBottom:".4rem",background:"rgba(201,168,76,.04)",border:"1px solid rgba(201,168,76,.2)",borderRadius:4,cursor:"pointer",fontSize:".84rem",color:"rgba(240,224,192,.88)",lineHeight:1.5}}>
                    <span style={{color:GOLD,fontSize:".68rem",letterSpacing:".05em",marginRight:".5rem",opacity:.85}}>[{c.ton}]</span>
                    {c.text}
                  </div>
                ))}
              </div>
            )}
            <div style={{display:"flex",gap:".4rem"}}>
              <input value={customInput} onChange={e=>setCustomInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!busy&&customInput.trim()&&yanitGonder(customInput, {}, [])} placeholder="ya da kendi yanıtını yaz..." disabled={busy} style={{flex:1,padding:".55rem .8rem",background:"rgba(0,0,0,.4)",border:`1px solid rgba(201,168,76,.25)`,borderRadius:4,color:IVORY,fontSize:".85rem",outline:"none",fontFamily:"inherit"}}/>
              <button onClick={()=>customInput.trim()&&!busy&&yanitGonder(customInput,{},[])} disabled={busy||!customInput.trim()} style={{padding:".5rem 1rem",background:customInput.trim()?GOLD:"rgba(201,168,76,.2)",border:"none",borderRadius:4,color:DARK,cursor:customInput.trim()?"pointer":"not-allowed",fontSize:".82rem",fontFamily:"'Cinzel Decorative',serif",fontWeight:700}}>↑</button>
            </div>
          </div>
        ) : (
          <div style={{borderTop:`1px solid rgba(201,168,76,.18)`,padding:"1rem 1.4rem",background:"rgba(0,0,0,.3)",textAlign:"center"}}>
            <div style={{fontSize:".82rem",color:"rgba(240,224,192,.7)",marginBottom:".7rem",fontStyle:"italic"}}>Sahne sonuna vardı. Bu olay vekayinameye geçecek.</div>
            <button onClick={()=>sahneyiKapat(true)} style={{padding:".55rem 1.5rem",background:`linear-gradient(135deg,#7a1515 0%,#c9a84c 100%)`,border:"none",borderRadius:4,color:DARK,cursor:"pointer",fontSize:".82rem",fontFamily:"'Cinzel Decorative',serif",fontWeight:700,letterSpacing:".06em"}}>Sahneyi Kapat</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────────
// ── MODAL: DİVAN SAHNESİ (ÇOKLU KARAKTER) ────────────────────────────────────
// ──────────────────────────────────────────────────────────────────────────────
function DivanModal({ open, agents, onClose, ctx }) {
  const [sahneHafiza, setSahneHafiza] = useState([]);
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);
  const sonuneRef = useRef(null);

  useEffect(() => {
    if (open) {
      setSahneHafiza([{ speaker:"narrator", text:`Divan-ı Hümâyun toplandı. ${agents.map(a=>AGENT_META[a]?.name).filter(Boolean).join(", ")} hazır bulunuyor.`, isOpening:true }]);
      setInput(""); setError(null);
    }
  }, [open]);

  useEffect(() => { sonuneRef.current?.scrollIntoView({ behavior:"smooth" }); }, [sahneHafiza, busy]);

  async function gonder() {
    if (!input.trim() || busy) return;
    setBusy(true); setError(null);
    const userMsg = input.trim();
    setInput("");
    try {
      const r = await multiCharacterTurn(agents, sahneHafiza.filter(m => m.speaker !== "narrator"), userMsg, {}, ctx);
      setSahneHafiza(h => [...h, { speaker:"user", text:userMsg }, ...r.replies]);
    } catch (e) { setError(e.message || "cevap alınamadı"); }
    setBusy(false);
  }

  if (!open) return null;
  return (
    <div style={{position:"fixed",inset:0,background:`linear-gradient(180deg, rgba(0,0,0,.94) 0%, rgba(13,13,26,.98) 100%)`,zIndex:300,display:"flex",flexDirection:"column",padding:"1rem"}}>
      <div style={{maxWidth:780,width:"100%",margin:"0 auto",flex:1,display:"flex",flexDirection:"column",background:"rgba(21,21,31,.6)",border:`1px solid rgba(201,168,76,.3)`,borderRadius:8,overflow:"hidden"}}>
        <div style={{padding:"1rem 1.4rem",borderBottom:`1px solid rgba(201,168,76,.2)`,background:`linear-gradient(135deg, rgba(201,168,76,.12) 0%, rgba(122,21,21,.08) 100%)`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontFamily:"'Cinzel Decorative',serif",color:GOLD,fontSize:"1.05rem",letterSpacing:".05em"}}>⚖️ Divan-ı Hümâyun</div>
            <div style={{fontSize:".72rem",color:"rgba(240,224,192,.55)",fontStyle:"italic",marginTop:".15rem"}}>{gameDateTr(ctx.day)} · {agents.length} kişi sahnede</div>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"1px solid rgba(201,168,76,.3)",color:"rgba(240,224,192,.65)",borderRadius:4,padding:".35rem .8rem",cursor:"pointer",fontSize:".78rem",fontFamily:"inherit"}}>çık</button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"1.25rem 1.4rem"}}>
          {sahneHafiza.map((m, i) => {
            if (m.speaker === "narrator") {
              return <div key={i} style={{padding:".7rem 1rem",marginBottom:".9rem",background:"rgba(201,168,76,.04)",borderLeft:`3px solid rgba(${rgb(GOLD)},.4)`,borderRadius:3,fontSize:".84rem",color:"rgba(240,224,192,.7)",fontStyle:"italic",lineHeight:1.65}}>{m.text}</div>;
            }
            const isUser = m.speaker === "user";
            const meta = AGENT_META[m.speaker];
            const speakerName = isUser ? (ctx.playerName || "Sen") : (meta?.name || m.speaker);
            const accent = isUser ? GOLD : (meta?.accent || GOLD);
            const emoji = isUser ? "🧭" : (meta?.emoji || "·");
            return (
              <div key={i} style={{marginBottom:".8rem",display:"flex",flexDirection:isUser?"row-reverse":"row",gap:".6rem",alignItems:"flex-start"}}>
                <div style={{flexShrink:0,fontSize:"1.4rem",marginTop:".15rem"}}>{emoji}</div>
                <div style={{maxWidth:"82%",padding:".7rem .95rem",background:isUser?`rgba(${rgb(GOLD)},.08)`:`rgba(${rgb(accent)},.06)`,border:`1px solid rgba(${rgb(accent)},.22)`,borderRadius:6}}>
                  <div style={{fontSize:".7rem",color:accent,marginBottom:".25rem",fontWeight:600}}>{speakerName}</div>
                  <div style={{fontSize:".88rem",color:IVORY,lineHeight:1.65,whiteSpace:"pre-wrap"}}>{m.text}</div>
                </div>
              </div>
            );
          })}
          {busy && <div style={{padding:".6rem 1rem",color:"rgba(201,168,76,.6)",fontSize:".82rem",fontStyle:"italic"}}>karakterler sırayla konuşuyor...</div>}
          {error && <div style={{padding:".7rem 1rem",background:"rgba(192,57,43,.12)",border:"1px solid rgba(192,57,43,.3)",borderRadius:4,color:"#e74c3c",fontSize:".82rem",marginBottom:".8rem"}}>{error}</div>}
          <div ref={sonuneRef}/>
        </div>
        <div style={{borderTop:`1px solid rgba(201,168,76,.18)`,padding:"1rem 1.4rem",background:"rgba(0,0,0,.3)",display:"flex",gap:".4rem"}}>
          <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&gonder()} placeholder="Sözünüzü buyurunuz..." disabled={busy} style={{flex:1,padding:".55rem .8rem",background:"rgba(0,0,0,.4)",border:`1px solid rgba(201,168,76,.25)`,borderRadius:4,color:IVORY,fontSize:".85rem",outline:"none",fontFamily:"inherit"}}/>
          <button onClick={gonder} disabled={busy||!input.trim()} style={{padding:".5rem 1.2rem",background:input.trim()&&!busy?GOLD:"rgba(201,168,76,.2)",border:"none",borderRadius:4,color:DARK,cursor:input.trim()&&!busy?"pointer":"not-allowed",fontSize:".82rem",fontFamily:"'Cinzel Decorative',serif",fontWeight:700}}>↑</button>
        </div>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────────
// ── MAIN APP ──────────────────────────────────────────────────────────────────
// ──────────────────────────────────────────────────────────────────────────────
function App() {
  // Auth / role
  const [phase, setPhase] = useState("apikey");
  const [apiKey, setApiKey] = useState("");
  const [model, setModel] = useState("claude-sonnet-4-5-20250929");
  const [player, setPlayer] = useState("Yolcu");
  const [playerRole, setPlayerRole] = useState("yolcu");

  // Navigation
  const [locId, setLocId] = useState("topkapi");
  const [agentId, setAgentId] = useState(null);
  const [convos, setConvos] = useState({}); // {agentId: [{role,text}]}
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const [waiting, setWaiting] = useState(false);

  // World time
  const [day, setDay] = useState(1);
  const [timeIdx, setTimeIdx] = useState(0);
  const [evIdx, setEvIdx] = useState(0);

  // Chronicle + activity
  const [chronicle, setChronicle] = useState([]);
  const [activityLog, setActivityLog] = useState([]);
  const [chronicleOpen, setChronicleOpen] = useState(false);
  const [newEventFlash, setNewEventFlash] = useState(false);

  // Mailbox
  const [mailbox, setMailbox] = useState([]);
  const [mailboxOpen, setMailboxOpen] = useState(false);
  const sentNotifs = useRef(new Set());

  // FAZ 3 — Matrix, ahval, rumors
  const [matrix, setMatrix] = useState(() => ({ ...ILK_MATRIS, user: ILK_USER_MATRIS }));
  const [ahval, setAhval] = useState(ILK_AHVAL);
  const [pendingRumors, setPendingRumors] = useState({}); // {agentId: [rumor]}
  const [tetiklenmis, setTetiklenmis] = useState([]); // tetiklenen senaryo idleri
  const [silinmis, setSilinmis] = useState([]); // sahneden çıkan karakter idleri
  const [sonInisiyatif, setSonInisiyatif] = useState({}); // {char: gunSayisi} cooldown
  const [tetiklenenCiviler, setTetiklenenCiviler] = useState([]);
  const [matrisOpen, setMatrisOpen] = useState(false);
  const [linkContext, setLinkContext] = useState("");
  const [pasteOpen, setPasteOpen] = useState(false);

  // Scene state
  const [activeScenario, setActiveScenario] = useState(null);
  const [divanOpen, setDivanOpen] = useState(false);
  const [divanAgents, setDivanAgents] = useState([]);

  const chatEnd = useRef(null);

  // ── EFFECTS ──
  useEffect(() => {
    const t = setInterval(() => setEvIdx(i => (i + 1) % EVENTS.length), 7000);
    return () => clearInterval(t);
  }, []);

  // World time ticker
  useEffect(() => {
    if (phase !== "game") return;
    const t = setInterval(() => {
      setTimeIdx(prev => {
        if (prev >= 3) { setDay(d => d + 1); return 0; }
        return prev + 1;
      });
    }, TICK_MS);
    return () => clearInterval(t);
  }, [phase]);

  // Chronicle background events
  useEffect(() => {
    if (phase !== "game") return;
    const newEvents = TIMELINE.filter(e => e.day === day && e.t === timeIdx);
    if (newEvents.length > 0) {
      setChronicle(c => [...newEvents, ...c].slice(0, 80));
      setNewEventFlash(true);
      const tm = setTimeout(() => setNewEventFlash(false), 4000);
      return () => clearTimeout(tm);
    }
  }, [day, timeIdx, phase]);

  // Role-based ambient notifications
  useEffect(() => {
    if (phase !== "game") return;
    const notes = generateNotifications(day, timeIdx, playerRole, sentNotifs.current);
    if (notes.length > 0) {
      notes.forEach(n => sentNotifs.current.add(n.id));
      setMailbox(m => [...m, ...notes.map(n => ({...n, read:false, day, t:timeIdx}))]);
    }
  }, [day, timeIdx, phase, playerRole]);

  // FAZ 3 — Tarihî çiviler kontrolü (her gün değişiminde)
  useEffect(() => {
    if (phase !== "game") return;
    TARIHI_CIVILER.forEach(civi => {
      if (civi.day === day && civi.t === timeIdx && !tetiklenenCiviler.includes(civi.id)) {
        // Etkileri uygula
        const newAhval = applyAhvalEffects(ahval, civi.etki || {});
        setAhval(newAhval);
        // Vekayinameye işle
        setChronicle(c => [{ day, t:timeIdx, text:`【${civi.baslik}】 ${civi.metin}`, agents:civi.agents }, ...c].slice(0, 80));
        // Karakter silmek gerekiyorsa
        if (civi.silinir) setSilinmis(s => [...s, ...civi.silinir]);
        setTetiklenenCiviler(t => [...t, civi.id]);
        // Bildirim
        setMailbox(m => [...m, {
          id: "civi-"+civi.id, from: "rustem", title: "Saraydan Haber: "+civi.baslik,
          body: civi.metin, read:false, day, t:timeIdx,
          action: null
        }]);
      }
    });
  }, [day, timeIdx, phase]);

  // FAZ 3 — Doğal sürüklenme (her gün değişiminde)
  useEffect(() => {
    if (phase !== "game" || day < 2) return;
    setAhval(a => uygulaDogalSurukleme(a, day));
    // Cooldown azalt
    setSonInisiyatif(prev => {
      const next = {};
      Object.entries(prev).forEach(([k,v]) => { if (v > 1) next[k] = v - 1; });
      return next;
    });
  }, [day, phase]);

  // FAZ 3 — Senaryo tetikleme kontrolü
  useEffect(() => {
    if (phase !== "game" || activeScenario || divanOpen) return;
    // Aday senaryolar
    const state = { tetiklenmis, silinmis, ahval, matrix };
    const adaylar = SENARYOLAR.filter(s => {
      if (tetiklenmis.includes(s.id)) return false;
      if (day < s.gun_aralik[0] || day > s.gun_aralik[1]) return false;
      if (s.on_kosul && !s.on_kosul(state)) return false;
      return true;
    });
    adaylar.forEach(s => {
      if (Math.random() < s.olasilik * 0.18) { // her tick'te düşük şans
        setMailbox(m => {
          // aynı senaryo kutuda zaten varsa eklemiyoruz
          if (m.some(x => x.id === "scn-"+s.id)) return m;
          return [...m, {
            id: "scn-"+s.id, from: s.karakterler[0], title: "Bir mesele: "+s.baslik,
            body: s.metin.slice(0,180)+"...", read:false, day, t:timeIdx,
            action: { type:"scenario", scenarioId: s.id }
          }];
        });
      }
    });
  }, [day, timeIdx, phase]);

  // FAZ 3 — Karakter inisiyatifi (eşik 3)
  useEffect(() => {
    if (phase !== "game" || activeScenario || divanOpen) return;
    const sahneler = karakterInisiyatifi(ahval, silinmis, sonInisiyatif);
    sahneler.slice(0, 1).forEach(s => { // bir tickte en fazla 1 inisiyatif
      const meta = AGENT_META[s.char];
      const baslikMap = { "şüphe_konuşması":"sizi görmek istiyor", "siyasî_arz":"konuşmak istediği bir mesele var", "itiraf_anı":"sizi bekliyor", "yüzleşme":"bir hesap arıyor" };
      const baslik = baslikMap[s.tip] || "sizinle konuşmak istiyor";
      setMailbox(m => {
        const id = "ini-"+s.char+"-d"+day;
        if (m.some(x => x.id === id)) return m;
        return [...m, {
          id, from: s.char, title: meta.name+" "+baslik,
          body: `İçinden geçenler birikti gibi. ${meta.name} sizi görmek istiyor.`,
          read:false, day, t:timeIdx,
          action: { type:"goto", locId: findCharLoc(s.char), agentId: s.char }
        }];
      });
      setSonInisiyatif(p => ({ ...p, [s.char]: 4 })); // 4 gün cooldown
    });
  }, [day, ahval, phase]);

  // Auto-scroll
  useEffect(() => { chatEnd.current?.scrollIntoView({ behavior:"smooth" }); }, [convos, agentId, waiting]);

  // ── helpers ──
  function findCharLoc(charId) {
    for (const [lid, l] of Object.entries(LOCATIONS)) {
      if (l.agents.includes(charId)) return lid;
    }
    return "topkapi";
  }

  const unreadCount = mailbox.filter(m => !m.read).length;

  // ── Auth flow ──
  const handleApiKey = ({ apiKey, model }) => {
    setApiKey(apiKey); setModel(model); setPhase("role");
  };
  const handleRole = ({ playerName, playerRole }) => {
    setPlayer(playerName); setPlayerRole(playerRole); setPhase("game");
  };

  // ── Mail action ──
  const handleMailAction = (mail) => {
    if (!mail.action) { setMailboxOpen(false); return; }
    if (mail.action.type === "goto") {
      setLocId(mail.action.locId);
      setAgentId(mail.action.agentId);
      setMailboxOpen(false);
    } else if (mail.action.type === "divan") {
      setDivanAgents(mail.action.agents || []);
      setDivanOpen(true);
      setMailboxOpen(false);
    } else if (mail.action.type === "scenario") {
      const s = SENARYOLAR.find(x => x.id === mail.action.scenarioId);
      if (s) {
        setActiveScenario(s);
        setMailboxOpen(false);
      }
    }
  };

  const handleMarkRead = (id) => {
    setMailbox(m => m.map(x => x.id === id ? {...x, read:true} : x));
  };

  // ── Send to a single agent ──
  const send = async () => {
    if (!input.trim() || !agentId || busy) return;
    const userMsg = input.trim();
    setInput("");
    setBusy(true); setWaiting(true);
    const history = convos[agentId] || [];
    setConvos(c => ({...c, [agentId]: [...(c[agentId] || []), { role:"user", text:userMsg }]}));
    const ctx = {
      apiKey, model, day, timeIdx, chronicle, activityLog,
      playerName: player, playerRole, linkContext,
      matrix, ahval, pendingRumors: pendingRumors[agentId] || []
    };
    try {
      const reply = await fetchAgentReply(agentId, history, userMsg, ctx);
      setConvos(c => ({...c, [agentId]: [...(c[agentId] || []), { role:"user", text:userMsg }, { role:"assistant", text:reply }]}));
      setActivityLog(a => [...a, { agentId, topic: userMsg.slice(0,90), day, t:timeIdx }].slice(-30));
      // Söylenti kuyruğunda bu karaktere düşmüş olanları temizle
      setPendingRumors(p => { const next = {...p}; delete next[agentId]; return next; });
    } catch (e) {
      setConvos(c => ({...c, [agentId]: [...(c[agentId] || []), { role:"user", text:userMsg }, { role:"assistant", text:"(Cevap alınamadı: " + (e.message||"hata") + ")" }]}));
    }
    setBusy(false); setWaiting(false);
  };

  // ── Senaryo tamamlandığında ──
  const handleScenarioComplete = (result) => {
    if (!activeScenario) return;
    if (result.partial && result.etki) {
      setMatrix(m => applyMatrixDeltas(m, result.etki));
    }
    if (result.tamamlandi) {
      setTetiklenmis(t => [...t, activeScenario.id]);
      setChronicle(c => [{ day, t:timeIdx, text:`【Sahne】 ${activeScenario.baslik}: Olay yaşandı.`, agents:activeScenario.karakterler }, ...c].slice(0, 80));
      setActiveScenario(null);
      // Tek-iki gün ilerlet
      setDay(d => d + 1);
    } else if (!result.partial) {
      setActiveScenario(null);
    }
  };

  // ── RENDER ──
  if (phase === "apikey") return <ApiKeyScreen onSubmit={handleApiKey}/>;
  if (phase === "role") return <RoleScreen onSelect={handleRole}/>;

  const loc = LOCATIONS[locId];
  const aktifAgentler = (loc.agents || []).filter(a => !silinmis.includes(a));
  const role = ROLES[playerRole];
  const ctx = { apiKey, model, day, timeIdx, chronicle, activityLog, playerName:player, playerRole, linkContext, matrix, ahval };

  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(180deg, rgba(13,13,26,1) 0%, rgba(20,15,15,1) 100%)`,color:IVORY,fontFamily:"'EB Garamond',Georgia,serif"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
        @keyframes ev-scroll{0%{opacity:0;transform:translateY(8px);}10%,90%{opacity:1;transform:none;}100%{opacity:0;transform:translateY(-8px);}}
        @keyframes pulse-gold{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,.4);}50%{box-shadow:0 0 0 8px rgba(201,168,76,0);}}
        .ev-fly{animation:ev-scroll 7s ease-in-out;}
        .flash-event{animation:pulse-gold 1s ease 3;}
        .loc-card{transition:all .2s;cursor:pointer;}
        .loc-card:hover{transform:translateY(-2px);border-color:rgba(201,168,76,.5)!important;}
        .agent-pick{transition:all .15s;cursor:pointer;}
        .agent-pick:hover{transform:translateX(3px);}
        .suggestion-btn{transition:all .15s;cursor:pointer;}
        .suggestion-btn:hover{background:rgba(201,168,76,.1)!important;border-color:rgba(201,168,76,.4)!important;}
      `}</style>

      {/* Top bar */}
      <div style={{position:"sticky",top:0,zIndex:50,background:"rgba(13,13,26,.96)",backdropFilter:"blur(8px)",borderBottom:`1px solid rgba(201,168,76,.18)`,padding:".6rem 1rem",display:"flex",alignItems:"center",justifyContent:"space-between",gap:".5rem",flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:".7rem",minWidth:0,flexShrink:1}}>
          <div style={{fontSize:"1.5rem"}}>☽</div>
          <div style={{minWidth:0}}>
            <div style={{fontFamily:"'Cinzel Decorative',serif",color:GOLD,fontSize:".82rem",letterSpacing:".05em"}}>İstanbul, 1550</div>
            <div style={{fontSize:".66rem",color:"rgba(240,224,192,.5)",fontStyle:"italic"}}>{role.emoji} {role.name === "Yolcu" ? player : role.name} · Gün {day} ({gameDateTr(day)}) · {TIME_LABELS[timeIdx]} {TIME_ICONS[timeIdx]}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:".4rem",alignItems:"center",flexShrink:0}}>
          <button onClick={()=>setPasteOpen(true)} title="Bir kaynak ya da metin paylaş" style={{background:linkContext?`rgba(${rgb(GOLD)},.18)`:"rgba(255,255,255,.04)",border:`1px solid rgba(201,168,76,${linkContext?.5:.2})`,color:linkContext?GOLD:"rgba(240,224,192,.65)",borderRadius:4,padding:".4rem .6rem",cursor:"pointer",fontSize:".78rem",fontFamily:"inherit"}}>
            📎
          </button>
          <button onClick={()=>setMatrisOpen(true)} title="Saray münasebetleri" style={{background:"rgba(255,255,255,.04)",border:`1px solid rgba(201,168,76,.2)`,color:"rgba(240,224,192,.7)",borderRadius:4,padding:".4rem .6rem",cursor:"pointer",fontSize:".78rem",fontFamily:"inherit"}}>
            🕸️
          </button>
          <button onClick={()=>setChronicleOpen(true)} className={newEventFlash?"flash-event":""} title="Vekâyiname" style={{background:newEventFlash?`rgba(${rgb(GOLD)},.2)`:"rgba(255,255,255,.04)",border:`1px solid rgba(201,168,76,${newEventFlash?.5:.2})`,color:"rgba(240,224,192,.7)",borderRadius:4,padding:".4rem .6rem",cursor:"pointer",fontSize:".78rem",fontFamily:"inherit"}}>
            📜
          </button>
          <button onClick={()=>setMailboxOpen(true)} title="Posta kutusu" style={{position:"relative",background:"rgba(255,255,255,.04)",border:`1px solid rgba(201,168,76,.2)`,color:"rgba(240,224,192,.7)",borderRadius:4,padding:".4rem .6rem",cursor:"pointer",fontSize:".78rem",fontFamily:"inherit"}}>
            ✉️
            {unreadCount > 0 && <span style={{position:"absolute",top:-4,right:-4,minWidth:16,height:16,padding:"0 4px",background:CRIMSON,color:"white",borderRadius:8,fontSize:".62rem",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{unreadCount}</span>}
          </button>
        </div>
      </div>

      {/* Ambient ticker */}
      <div style={{padding:".3rem 1rem",background:"rgba(201,168,76,.04)",borderBottom:`1px solid rgba(201,168,76,.1)`,fontSize:".74rem",color:"rgba(240,224,192,.65)",fontStyle:"italic",minHeight:24,textAlign:"center",overflow:"hidden"}}>
        <div key={evIdx} className="ev-fly">{EVENTS[evIdx]}</div>
      </div>

      {/* Body */}
      <div style={{maxWidth:1100,margin:"0 auto",padding:"1rem",display:"grid",gridTemplateColumns:"minmax(220px, 280px) 1fr",gap:"1rem"}}>
        {/* Left: locations + agents */}
        <div>
          <div style={{fontSize:".66rem",color:"rgba(201,168,76,.65)",letterSpacing:".18em",textTransform:"uppercase",marginBottom:".5rem"}}>Mekânlar</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:".4rem",marginBottom:"1.2rem"}}>
            {Object.values(LOCATIONS).map(l => {
              const isActive = l.id === locId;
              return (
                <div key={l.id} className="loc-card" onClick={()=>{ setLocId(l.id); setAgentId(null); }} style={{padding:".5rem .6rem",background:isActive?`rgba(${rgb(GOLD)},.12)`:"rgba(255,255,255,.03)",border:`1px solid rgba(201,168,76,${isActive?.5:.18})`,borderRadius:4,textAlign:"center"}}>
                  <div style={{fontSize:"1.2rem"}}>{l.emoji}</div>
                  <div style={{fontSize:".7rem",color:isActive?GOLD:"rgba(240,224,192,.7)",marginTop:".2rem",fontWeight:isActive?600:400,lineHeight:1.2}}>{l.name}</div>
                </div>
              );
            })}
          </div>

          <div style={{padding:".7rem .8rem",background:"rgba(201,168,76,.04)",border:"1px solid rgba(201,168,76,.15)",borderRadius:6,marginBottom:"1rem"}}>
            <div style={{display:"flex",alignItems:"center",gap:".4rem",marginBottom:".3rem"}}>
              <span style={{fontSize:"1.2rem"}}>{loc.emoji}</span>
              <span style={{fontFamily:"'Playfair Display',serif",color:GOLD,fontSize:".88rem",fontWeight:600}}>{loc.name}</span>
            </div>
            <div style={{fontSize:".68rem",color:"rgba(240,224,192,.45)",fontStyle:"italic",marginBottom:".4rem"}}>{loc.subtitle}</div>
            <div style={{fontSize:".74rem",color:"rgba(240,224,192,.65)",lineHeight:1.55}}>{loc.desc}</div>
          </div>

          <div style={{fontSize:".66rem",color:"rgba(201,168,76,.65)",letterSpacing:".18em",textTransform:"uppercase",marginBottom:".5rem"}}>Buradakiler</div>
          {aktifAgentler.length === 0 ? (
            <p style={{color:"rgba(240,224,192,.4)",fontStyle:"italic",fontSize:".82rem"}}>Burada konuşacak kimse yok.</p>
          ) : (
            aktifAgentler.filter(a => {
              const excl = ROLES[playerRole]?.excludeFrom || [];
              return !excl.includes(a);
            }).map(aid => {
              const meta = AGENT_META[aid];
              const isActive = agentId === aid;
              return (
                <div key={aid} className="agent-pick" onClick={()=>{ setAgentId(aid); }} style={{padding:".55rem .7rem",marginBottom:".35rem",background:isActive?`rgba(${rgb(meta.accent)},.14)`:"rgba(255,255,255,.02)",border:`1px solid rgba(${rgb(meta.accent)},${isActive?.5:.18})`,borderRadius:4,display:"flex",alignItems:"center",gap:".5rem"}}>
                  <span style={{fontSize:"1.1rem"}}>{meta.emoji}</span>
                  <div style={{minWidth:0}}>
                    <div style={{color:meta.accent,fontSize:".82rem",fontWeight:600,lineHeight:1.2}}>{meta.name}</div>
                    <div style={{fontSize:".64rem",color:"rgba(240,224,192,.5)",fontStyle:"italic",lineHeight:1.2,marginTop:".1rem"}}>{meta.title}</div>
                  </div>
                </div>
              );
            })
          )}
        </div>

        {/* Right: chat */}
        <div style={{minHeight:"60vh",display:"flex",flexDirection:"column",background:"rgba(255,255,255,.02)",border:`1px solid rgba(201,168,76,.15)`,borderRadius:6,overflow:"hidden"}}>
          {!agentId ? (
            <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"2rem",textAlign:"center"}}>
              <div>
                <div style={{fontSize:"2.5rem",marginBottom:".5rem",opacity:.5}}>☽</div>
                <p style={{color:"rgba(240,224,192,.55)",fontStyle:"italic"}}>Bir mekândan bir karakter seçin.</p>
                {linkContext && <p style={{color:GOLD,fontSize:".74rem",marginTop:".7rem"}}>📎 Bir kaynak metnini yapıştırdınız — karakterler haberdar olacak.</p>}
              </div>
            </div>
          ) : (() => {
            const meta = AGENT_META[agentId];
            const history = convos[agentId] || [];
            return (
              <>
                <div style={{padding:".75rem 1rem",borderBottom:`1px solid rgba(${rgb(meta.accent)},.25)`,background:`rgba(${rgb(meta.accent)},.04)`,display:"flex",alignItems:"center",gap:".6rem"}}>
                  <span style={{fontSize:"1.5rem"}}>{meta.emoji}</span>
                  <div>
                    <div style={{fontFamily:"'Playfair Display',serif",color:meta.accent,fontSize:".95rem",fontWeight:600}}>{meta.name}</div>
                    <div style={{fontSize:".66rem",color:"rgba(240,224,192,.5)",fontStyle:"italic"}}>{meta.title}</div>
                  </div>
                </div>
                <div style={{flex:1,overflowY:"auto",padding:"1rem 1.2rem",maxHeight:"55vh"}}>
                  {history.length === 0 && (
                    <div style={{padding:".8rem",background:"rgba(255,255,255,.02)",border:"1px solid rgba(201,168,76,.12)",borderRadius:6,marginBottom:"1rem"}}>
                      <div style={{fontSize:".68rem",color:"rgba(201,168,76,.7)",letterSpacing:".12em",textTransform:"uppercase",marginBottom:".4rem"}}>Konuşma başlatın</div>
                      {(AGENT_SUGGESTIONS[agentId] || []).map((s, i) => (
                        <div key={i} className="suggestion-btn" onClick={()=>{ setInput(s); }} style={{padding:".4rem .7rem",marginBottom:".25rem",background:"rgba(201,168,76,.04)",border:"1px solid rgba(201,168,76,.18)",borderRadius:3,fontSize:".78rem",color:"rgba(240,224,192,.8)"}}>{s}</div>
                      ))}
                    </div>
                  )}
                  {history.map((m, i) => {
                    const isUser = m.role === "user";
                    return (
                      <div key={i} style={{marginBottom:".75rem",display:"flex",flexDirection:isUser?"row-reverse":"row",gap:".5rem",alignItems:"flex-start"}}>
                        <div style={{flexShrink:0,fontSize:"1.3rem"}}>{isUser?"🧭":meta.emoji}</div>
                        <div style={{maxWidth:"82%",padding:".65rem .9rem",background:isUser?`rgba(${rgb(GOLD)},.07)`:`rgba(${rgb(meta.accent)},.05)`,border:`1px solid rgba(${rgb(isUser?GOLD:meta.accent)},.2)`,borderRadius:6}}>
                          <div style={{fontSize:".87rem",color:IVORY,lineHeight:1.65,whiteSpace:"pre-wrap"}}>{m.text}</div>
                        </div>
                      </div>
                    );
                  })}
                  {waiting && (
                    <div style={{padding:".5rem 1rem",color:"rgba(201,168,76,.6)",fontSize:".8rem",fontStyle:"italic"}}>düşünüyor...</div>
                  )}
                  <div ref={chatEnd}/>
                </div>
                <div style={{borderTop:`1px solid rgba(201,168,76,.15)`,padding:".7rem 1rem",display:"flex",gap:".4rem",background:"rgba(0,0,0,.2)"}}>
                  <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder={`${meta.name} ile konuşun...`} disabled={busy} style={{flex:1,padding:".55rem .8rem",background:"rgba(0,0,0,.4)",border:`1px solid rgba(201,168,76,.22)`,borderRadius:4,color:IVORY,fontSize:".88rem",outline:"none",fontFamily:"inherit"}}/>
                  <button onClick={send} disabled={busy||!input.trim()} style={{padding:".5rem 1rem",background:input.trim()&&!busy?GOLD:"rgba(201,168,76,.2)",border:"none",borderRadius:4,color:DARK,cursor:input.trim()&&!busy?"pointer":"not-allowed",fontSize:".82rem",fontFamily:"'Cinzel Decorative',serif",fontWeight:700}}>↑</button>
                </div>
              </>
            );
          })()}
        </div>
      </div>

      {/* Footer */}
      <div style={{maxWidth:1100,margin:"0 auto",padding:".4rem 1rem 1.5rem 1rem",fontSize:".66rem",color:"rgba(240,224,192,.3)",textAlign:"center",fontStyle:"italic"}}>
        © Prof. Dr. Hasan Hüseyin Güneş · livehistory.app — CC BY-NC-SA 4.0 · Faz 3
      </div>

      {/* Panels & Modals */}
      <MailboxPanel open={mailboxOpen} onClose={()=>setMailboxOpen(false)} mailbox={mailbox} onOpenAction={handleMailAction} onMarkRead={handleMarkRead}/>
      <ChroniclePanel open={chronicleOpen} onClose={()=>setChronicleOpen(false)} day={day} timeIdx={timeIdx} chronicle={chronicle}/>
      <MatrisPanel open={matrisOpen} onClose={()=>setMatrisOpen(false)} matrix={matrix} ahval={ahval} silinmis={silinmis} day={day}/>
      <MetinYapistirModal open={pasteOpen} onClose={()=>setPasteOpen(false)} onSubmit={setLinkContext} current={linkContext}/>
      <SenaryoModal open={!!activeScenario} senaryo={activeScenario} onClose={()=>setActiveScenario(null)} onTamamla={handleScenarioComplete} ctx={ctx}/>
      <DivanModal open={divanOpen} agents={divanAgents} onClose={()=>setDivanOpen(false)} ctx={ctx}/>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
