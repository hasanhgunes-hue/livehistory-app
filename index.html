// ── DYNAMIC SYSTEM PROMPT BUILDER ────────────────────────────────────────────
function buildSystemPrompt(agentId, ctx) {
  const base = AGENT_PROMPTS[agentId] || "";
  const { day, timeIdx, chronicle, activityLog, playerName, playerRole, linkContext } = ctx;

  const myEvents = chronicle
    .filter(e => e.agents.includes("all") || e.agents.includes(agentId))
    .slice(0, 8);

  const otherActivity = activityLog
    .filter(a => a.agentId !== agentId)
    .slice(-6);

  let ctxBlock = `\n\n──── ŞU AN ────\nGün ${day} · ${TIME_LABELS[timeIdx]} ${TIME_ICONS[timeIdx]} · İstanbul, 1550`;

  // Add role addressing
  const roleAddressing = getRoleAddressing(agentId, playerRole);
  ctxBlock += `\n\n──── KULLANICI KİMLİĞİ ────\n${roleAddressing}`;

  if (playerRole !== "yolcu") {
    ctxBlock += `\nKullanıcının oyundaki adı/rolü: ${ROLES[playerRole]?.name || playerName}`;
  } else {
    ctxBlock += `\nKullanıcının adı: ${playerName}`;
  }

  if (myEvents.length > 0) {
    ctxBlock += `\n\n──── SON OLAYLAR (sizin haberdar olduklarınız) ────`;
    myEvents.forEach(e => {
      ctxBlock += `\n· (G${e.day}-${TIME_LABELS[e.t][0]}) ${e.text}`;
    });
    ctxBlock += `\n\nBu olaylara doğal şekilde atıfta bulun. Suni yapma, ama uygun bağlam varsa "az önce duydum ki..." gibi.`;
  }

  if (otherActivity.length > 0) {
    ctxBlock += `\n\n──── SARAY KULAĞI (${playerName} hakkında işitilenler) ────`;
    otherActivity.forEach(a => {
      const otherName = AGENT_META[a.agentId]?.name || "biri";
      ctxBlock += `\n· ${playerName}, ${otherName} ile şunu konuştu: "${a.topic}"`;
    });
    ctxBlock += `\n\nBu dedikodulara doğal şekilde atıfta bulunabilirsin, kendi karakter perspektifinle (alaylı, ilgili, kıskanç, vs.).`;
  }

  if (linkContext) {
    ctxBlock += `\n\n──── KULLANICININ PAYLAŞTIĞI KAYNAK ────\nKullanıcı bir bağlantı paylaştı. İçeriği:\n"${linkContext}"\n\nBu kaynaktan haberdarmış gibi davran, ama 1550 perspektifinden. Eğer kaynak modern bir akademik çalışmaysa, "bunu gelecekten getirmiş gibisin, ama ilginç" diye bir oyunla yorum yapabilirsin. İçerik tarihî bir konuyla ilgiliyse, kendi bilgilerinle eşleştir.`;
  }

  return base + TEACHING_DIRECTIVE + ctxBlock;
}

async function fetchAgentReply(agentId, history, userMsg, ctx) {
  const apiMessages = history.map(m => ({
    role: m.role === "user" ? "user" : "assistant",
    content: m.text,
  }));
  apiMessages.push({ role: "user", content: userMsg });

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": ctx.apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: ctx.model || "claude-sonnet-4-5-20250929",
      max_tokens: 1200,
      system: buildSystemPrompt(agentId, ctx),
      messages: apiMessages,
    }),
  });

  if (!res.ok) {
    const errText = await res.text();
    let msg;
    try { msg = JSON.parse(errText)?.error?.message || errText; }
    catch { msg = errText || `HTTP ${res.status}`; }
    throw new Error(msg);
  }

  const data = await res.json();
  return data.content?.[0]?.text || "...";
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [phase, setPhase] = useState("apikey");
  const [apiKey, setApiKey] = useState("");
  const [model, setModel] = useState("claude-sonnet-4-5-20250929");
  const [player, setPlayer] = useState("Yolcu");
  const [playerRole, setPlayerRole] = useState("yolcu");
  const [locId, setLocId] = useState("topkapi");
  const [agentId, setAgentId] = useState(null);
  const [convos, setConvos] = useState({});
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const [waiting, setWaiting] = useState(false);
  const [evIdx, setEvIdx] = useState(0);

  const [day, setDay] = useState(1);
  const [timeIdx, setTimeIdx] = useState(0);
  const [chronicle, setChronicle] = useState([]);
  const [activityLog, setActivityLog] = useState([]);
  const [chronicleOpen, setChronicleOpen] = useState(false);
  const [newEventFlash, setNewEventFlash] = useState(false);

  // Mailbox
  const [mailbox, setMailbox] = useState([]);
  const [mailboxOpen, setMailboxOpen] = useState(false);
  const sentNotifs = useRef(new Set());

  const chatEnd = useRef(null);
  const typeTimer = useRef(null);

  // Ambient ticker
  useEffect(() => {
    const t = setInterval(() => setEvIdx(i => (i + 1) % EVENTS.length), 7000);
    return () => clearInterval(t);
  }, []);

  // World time
  useEffect(() => {
    if (phase !== "game") return;
    const t = setInterval(() => {
      setTimeIdx(prev => { if (prev >= 3) { setDay(d => d + 1); return 0; } return prev + 1; });
    }, TICK_MS);
    return () => clearInterval(t);
  }, [phase]);

  // Chronicle events
  useEffect(() => {
    if (phase !== "game") return;
    const newEvents = TIMELINE.filter(e => e.day === day && e.t === timeIdx);
    if (newEvents.length > 0) {
      setChronicle(c => [...newEvents, ...c].slice(0, 60));
      setNewEventFlash(true);
      const tm = setTimeout(() => setNewEventFlash(false), 4000);
      return () => clearTimeout(tm);
    }
  }, [day, timeIdx, phase]);

  // Role-based notifications
  useEffect(() => {
    if (phase !== "game") return;
    const notes = generateNotifications(day, timeIdx, playerRole, sentNotifs.current);
    if (notes.length > 0) {
      notes.forEach(n => sentNotifs.current.add(n.id));
      setMailbox(m => [...m, ...notes.map(n => ({...n, read:false, day, t:timeIdx}))]);
    }
  }, [day, timeIdx, phase, playerRole]);

  useEffect(() => { chatEnd.current?.scrollIntoView({ behavior: "smooth" }); }, [convos, agentId, waiting]);
  useEffect(() => () => clearInterval(typeTimer.current), []);

  const unreadCount = mailbox.filter(m => !m.read).length;

  const handleSetAgent = (id) => {
    clearInterval(typeTimer.current);
    setBusy(false); setWaiting(false); setAgentId(id);
  };

  const handleMailAction = (mail) => {
    if (mail.action && mail.action.type === "goto") {
      setLocId(mail.action.locId);
      setAgentId(mail.action.agentId);
      setMailboxOpen(false);
    }
  };

  const markMailRead = (id) => {
    setMailbox(m => m.map(x => x.id === id ? {...x, read:true} : x));
  };

  // Detect URL in user message (basic)
  const extractUrl = (text) => {
    const m = text.match(/https?:\/\/[^\s]+/);
    return m ? m[0] : null;
  };

  const send = async () => {
    if (!input.trim() || busy || !agentId) return;
    const msg = input.trim();
    const aId = agentId;
    setInput(""); setBusy(true); setWaiting(true);

    const prev = convos[aId] || [];
    const next = [...prev, { role: "user", text: msg }];
    setConvos(c => ({ ...c, [aId]: next }));

    const topic = msg.length > 90 ? msg.slice(0, 87) + "..." : msg;
    setActivityLog(log => [...log, { agentId: aId, topic, day, t: timeIdx }].slice(-20));

    // Detect link and prepare context
    const url = extractUrl(msg);
    let linkContext = null;
    if (url) {
      linkContext = `Kullanıcı şu bağlantıyı paylaştı: ${url}. Bağlantının içeriğini doğrudan okuyamıyorsun, ama URL'den ne tür bir kaynak olduğunu çıkar (örneğin: dergipark = Türk akademik makale, jstor = uluslararası akademik, wikipedia = ansiklopedi, vs.) ve kullanıcıya bu kaynağın türü ve muhtemel konusu hakkında karakterinin perspektifinden konuş.`;
    }

    const ctx = { day, timeIdx, chronicle, activityLog, playerName: player, playerRole, apiKey, model, linkContext };

    try {
      const reply = await fetchAgentReply(aId, prev, msg, ctx);

      setWaiting(false);
      setConvos(c => ({ ...c, [aId]: [...next, { role: "agent", text: "" }] }));

      let i = 0;
      clearInterval(typeTimer.current);
      typeTimer.current = setInterval(() => {
        i = Math.min(i + 8, reply.length);
        setConvos(c => {
          const arr = [...(c[aId] || [])];
          if (arr.length > 0) arr[arr.length - 1] = { role: "agent", text: reply.slice(0, i) };
          return { ...c, [aId]: arr };
        });
        if (i >= reply.length) { clearInterval(typeTimer.current); setBusy(false); }
      }, 16);

    } catch (err) {
      setWaiting(false);
      setBusy(false);
      setConvos(c => ({
        ...c,
        [aId]: [...next, { role: "agent", text: `⚠️ ${err.message}` }],
      }));
    }
  };

  if (phase === "apikey") {
    return <ApiKeyScreen onSubmit={({apiKey: k, model: m}) => { setApiKey(k); setModel(m); setPhase("role"); }} />;
  }
  if (phase === "role") {
    return <RoleScreen onSelect={({playerName, playerRole}) => { setPlayer(playerName); setPlayerRole(playerRole); setPhase("game"); }} />;
  }

  const loc = LOCATIONS[locId];
  const ag = agentId ? AGENT_META[agentId] : null;
  const convo = agentId ? (convos[agentId] || []) : [];
  const role = ROLES[playerRole];

  // Filter out the player's own character from agents list
  const excludeSelf = (agents) => {
    if (playerRole === "yolcu") return agents;
    return agents.filter(a => a !== playerRole);
  };

  return (
    <div style={{minHeight:"100vh",background:DARK,color:IVORY,fontFamily:"'EB Garamond',Georgia,serif",display:"flex",flexDirection:"column",fontSize:"16px"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
        *{box-sizing:border-box;}
        ::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:rgba(201,168,76,.22);border-radius:2px;}
        .lt{transition:all .15s;} .lt:hover{background:rgba(201,168,76,.12)!important;}
        .ac{transition:all .18s;} .ac:hover{background:rgba(255,255,255,.07)!important;transform:translateY(-1px);}
        .suggest-btn{transition:all .15s;}
        .suggest-btn:hover{background:rgba(201,168,76,.18)!important;border-color:rgba(201,168,76,.5)!important;}
        .send-btn{transition:all .15s;} .send-btn:hover:not(:disabled){opacity:.85;}
        .icon-btn{transition:all .15s;cursor:pointer;}
        .icon-btn:hover{background:rgba(201,168,76,.14)!important;}
        @keyframes think{0%,100%{opacity:.25;transform:scale(.85);}50%{opacity:1;transform:scale(1.15);}}
        .dot{display:inline-block;width:6px;height:6px;border-radius:50%;animation:think 1.2s ease-in-out infinite;}
        .dot:nth-child(2){animation-delay:.18s;} .dot:nth-child(3){animation-delay:.36s;}
        @keyframes fade-in{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
        .msg-in{animation:fade-in .3s ease both;}
        @keyframes flash-pulse{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,.5);}50%{box-shadow:0 0 0 8px rgba(201,168,76,0);}}
        .flash{animation:flash-pulse 1.5s ease-in-out infinite;}
        @keyframes badge-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}
        .badge{animation:badge-pulse 2s ease-in-out infinite;}
      `}</style>

      {/* HEADER */}
      <div style={{padding:".55rem .9rem",borderBottom:`1px solid rgba(201,168,76,.16)`,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,gap:".4rem"}}>
        <div style={{minWidth:0,flex:1}}>
          <div style={{fontFamily:"'Cinzel Decorative',serif",fontSize:".72rem",color:GOLD,letterSpacing:".13em"}}>☽ İSTANBUL · 1550</div>
          <div style={{fontSize:".62rem",color:"rgba(240,224,192,.42)"}}>
            {role.emoji} {role.id === "yolcu" ? player : role.name}
          </div>
        </div>

        {/* Mail icon */}
        <button className="icon-btn" onClick={() => setMailboxOpen(true)}
          style={{position:"relative",padding:".3rem .55rem",background:"rgba(201,168,76,.06)",border:"1px solid rgba(201,168,76,.25)",borderRadius:20,color:GOLD,fontSize:".95rem",cursor:"pointer"}}>
          ✉️
          {unreadCount > 0 && (
            <span className="badge" style={{position:"absolute",top:-4,right:-4,minWidth:18,height:18,padding:"0 5px",background:"#c0392b",color:"#fff",fontSize:".64rem",fontWeight:"bold",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center"}}>
              {unreadCount}
            </span>
          )}
        </button>

        {/* Clock */}
        <button className={`icon-btn ${newEventFlash ? "flash" : ""}`} onClick={() => setChronicleOpen(true)}
          style={{display:"flex",alignItems:"center",gap:".35rem",padding:".3rem .6rem",background:"rgba(201,168,76,.06)",border:"1px solid rgba(201,168,76,.25)",borderRadius:20,color:GOLD,fontSize:".66rem",cursor:"pointer",letterSpacing:".05em",fontFamily:"inherit",whiteSpace:"nowrap"}}>
          <span style={{fontSize:".85rem"}}>{TIME_ICONS[timeIdx]}</span>
          <span>G{day}·{TIME_LABELS[timeIdx].slice(0,3).toUpperCase()}</span>
        </button>
      </div>

      {/* LOCATION TABS */}
      <div style={{display:"flex",overflowX:"auto",padding:".4rem .55rem",gap:".35rem",borderBottom:`1px solid rgba(201,168,76,.1)`,flexShrink:0,scrollbarWidth:"none"}}>
        {Object.values(LOCATIONS).map(l => {
          const active = l.id === locId;
          return (
            <button key={l.id} className="lt" onClick={() => { setLocId(l.id); handleSetAgent(null); }}
              style={{flex:"0 0 auto",padding:".3rem .58rem",background:active?"rgba(201,168,76,.18)":"transparent",border:`1px solid ${active?GOLD:"rgba(201,168,76,.16)"}`,borderRadius:18,color:active?GOLD:"rgba(240,224,192,.5)",fontSize:".68rem",cursor:"pointer",whiteSpace:"nowrap"}}>
              {l.emoji} {l.name}
            </button>
          );
        })}
      </div>

      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column"}}>
        {!agentId && (
          <div style={{flex:1,overflowY:"auto",padding:"1rem"}}>
            <div style={{textAlign:"center",marginBottom:"1.2rem",padding:"1.2rem 1rem",background:"rgba(255,255,255,.025)",border:`1px solid rgba(201,168,76,.12)`,borderRadius:8}}>
              <div style={{fontSize:"2.8rem",marginBottom:".35rem"}}>{loc.emoji}</div>
              <div style={{fontFamily:"'Cinzel Decorative',serif",fontSize:"1rem",color:GOLD,marginBottom:".15rem"}}>{loc.name}</div>
              <div style={{fontSize:".66rem",color:"rgba(201,168,76,.55)",letterSpacing:".13em",marginBottom:".8rem"}}>{loc.subtitle}</div>
              <p style={{color:"rgba(240,224,192,.62)",lineHeight:1.7,fontSize:".84rem",fontStyle:"italic",maxWidth:400,margin:"0 auto"}}>{loc.desc}</p>
            </div>

            <p style={{fontSize:".62rem",color:"rgba(201,168,76,.5)",letterSpacing:".15em",textTransform:"uppercase",marginBottom:".6rem"}}>Konuşabileceğiniz kişiler</p>

            <div style={{display:"flex",flexDirection:"column",gap:".55rem"}}>
              {excludeSelf(loc.agents).map(aid => {
                const a = AGENT_META[aid];
                if (!a) return null;
                const r = rgb(a.accent);
                const has = (convos[aid]?.length ?? 0) > 0;
                return (
                  <button key={aid} className="ac" onClick={() => handleSetAgent(aid)}
                    style={{display:"flex",alignItems:"center",gap:".8rem",padding:".85rem",cursor:"pointer",textAlign:"left",background:"rgba(255,255,255,.03)",border:`1px solid rgba(${r},.26)`,borderRadius:8,color:IVORY}}>
                    <div style={{width:44,height:44,borderRadius:"50%",flexShrink:0,background:`rgba(${r},.1)`,border:`2px solid rgba(${r},.42)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.35rem"}}>{a.emoji}</div>
                    <div style={{flex:1}}>
                      <div style={{fontFamily:"'Playfair Display',serif",color:a.accent,fontSize:".92rem",marginBottom:".08rem"}}>{a.name}</div>
                      <div style={{fontSize:".7rem",color:"rgba(240,224,192,.45)",fontStyle:"italic"}}>{a.title}</div>
                      {has && <div style={{fontSize:".62rem",color:"rgba(201,168,76,.45)",marginTop:".2rem"}}>✦ Konuşma devam ediyor</div>}
                    </div>
                    <div style={{color:"rgba(201,168,76,.32)",fontSize:"1.1rem"}}>›</div>
                  </button>
                );
              })}

              {excludeSelf(loc.agents).length === 0 && (
                <p style={{fontStyle:"italic",color:"rgba(240,224,192,.4)",textAlign:"center",padding:"1rem"}}>Burada konuşabileceğiniz kimse yok. Başka bir mekâna geçin.</p>
              )}
            </div>

            <p style={{textAlign:"center",marginTop:"1.4rem",fontSize:".68rem",color:"rgba(240,224,192,.25)",fontStyle:"italic",lineHeight:1.7}}>
              Karakterler şu an olan olayları biliyor. Posta kutunuza dikkat edin —<br/>rolünüze özel haberler ve davetler gelir.
            </p>
          </div>
        )}

        {agentId && ag && (
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:".55rem .9rem",flexShrink:0,borderBottom:`1px solid rgba(${rgb(ag.accent)},.18)`,background:`rgba(${rgb(ag.accent)},.04)`,display:"flex",alignItems:"center",gap:".7rem"}}>
              <button onClick={() => handleSetAgent(null)} style={{background:"transparent",border:"none",color:"rgba(240,224,192,.4)",cursor:"pointer",fontSize:"1.3rem",padding:0,lineHeight:1}}>‹</button>
              <div style={{width:32,height:32,borderRadius:"50%",flexShrink:0,background:`rgba(${rgb(ag.accent)},.12)`,border:`1px solid rgba(${rgb(ag.accent)},.42)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem"}}>{ag.emoji}</div>
              <div style={{flex:1}}>
                <div style={{fontFamily:"'Playfair Display',serif",color:ag.accent,fontSize:".85rem"}}>{ag.name}</div>
                <div style={{fontSize:".6rem",color:"rgba(240,224,192,.36)",fontStyle:"italic"}}>{ag.title}</div>
              </div>
              {busy && waiting && (<div style={{fontSize:".58rem",color:`rgba(${rgb(ag.accent)},.6)`,letterSpacing:".06em",fontStyle:"italic"}}>düşünüyor...</div>)}
            </div>

            <div style={{flex:1,overflowY:"auto",padding:"1rem",display:"flex",flexDirection:"column",gap:".8rem"}}>
              {convo.length === 0 && !waiting && (
                <div style={{textAlign:"center",padding:"1.4rem .5rem"}}>
                  <div style={{color:"rgba(240,224,192,.34)",fontStyle:"italic",fontSize:".87rem",lineHeight:1.8,marginBottom:"1.2rem"}}>
                    {ag.name}'a yaklaşıyorsunuz.<br/>
                    <span style={{fontSize:".77rem",opacity:.7}}>Ne sormak istersiniz?</span>
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:".4rem",justifyContent:"center"}}>
                    {(AGENT_SUGGESTIONS[agentId] || []).map((s, i) => (
                      <button key={i} className="suggest-btn" onClick={() => setInput(s)}
                        style={{padding:".36rem .7rem",background:"rgba(201,168,76,.07)",border:"1px solid rgba(201,168,76,.22)",borderRadius:18,color:"rgba(240,224,192,.6)",fontSize:".74rem",cursor:"pointer",fontStyle:"italic"}}>{s}</button>
                    ))}
                  </div>
                </div>
              )}

              {convo.map((msg, i) => (
                <div key={i} className="msg-in" style={{display:"flex",justifyContent:msg.role==="user"?"flex-end":"flex-start"}}>
                  {msg.role === "user" ? (
                    <div style={{maxWidth:"80%",padding:".55rem .85rem",background:"rgba(201,168,76,.12)",border:"1px solid rgba(201,168,76,.26)",borderRadius:"10px 10px 2px 10px",fontSize:".88rem",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{msg.text}</div>
                  ) : (
                    <div style={{maxWidth:"90%",padding:".7rem .92rem",background:`rgba(${rgb(ag.accent)},.06)`,border:`1px solid rgba(${rgb(ag.accent)},.18)`,borderRadius:"2px 10px 10px 10px",fontSize:".88rem",lineHeight:1.78,whiteSpace:"pre-wrap"}}>
                      <div style={{fontSize:".57rem",color:ag.accent,letterSpacing:".1em",marginBottom:".35rem",opacity:.8}}>{ag.name.toUpperCase()}</div>
                      {msg.text}
                      {i === convo.length - 1 && busy && !waiting && (<span style={{display:"inline-block",width:2,height:"1em",background:ag.accent,marginLeft:2,verticalAlign:"text-bottom",animation:"think .8s ease-in-out infinite"}}/>)}
                    </div>
                  )}
                </div>
              ))}

              {waiting && (
                <div className="msg-in" style={{display:"flex",justifyContent:"flex-start"}}>
                  <div style={{padding:".65rem .95rem",background:`rgba(${rgb(ag.accent)},.06)`,border:`1px solid rgba(${rgb(ag.accent)},.16)`,borderRadius:"2px 10px 10px 10px",display:"flex",alignItems:"center",gap:".3rem"}}>
                    <span style={{fontSize:".57rem",color:ag.accent,letterSpacing:".1em",marginRight:".4rem",opacity:.7}}>{ag.name.toUpperCase()}</span>
                    <span className="dot" style={{background:ag.accent}}/><span className="dot" style={{background:ag.accent}}/><span className="dot" style={{background:ag.accent}}/>
                  </div>
                </div>
              )}

              <div ref={chatEnd}/>
            </div>

            <div style={{padding:".6rem .8rem",borderTop:`1px solid rgba(201,168,76,.1)`,background:"rgba(0,0,0,.38)",flexShrink:0,display:"flex",gap:".5rem",alignItems:"flex-end"}}>
              <textarea value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }}}
                placeholder={busy ? "" : "Söyleyin... (link de paylaşabilirsiniz)"}
                disabled={busy} rows={2}
                style={{flex:1,padding:".5rem .75rem",background:"rgba(201,168,76,.05)",border:"1px solid rgba(201,168,76,.16)",borderRadius:6,color:IVORY,fontFamily:"Georgia,serif",fontSize:".86rem",resize:"none",outline:"none",lineHeight:1.5}}/>
              <button className="send-btn" onClick={send} disabled={busy || !input.trim()}
                style={{padding:".5rem 1rem",background:(!busy&&input.trim())?"rgba(201,168,76,.9)":"rgba(201,168,76,.16)",border:"none",borderRadius:6,color:DARK,fontWeight:"bold",cursor:(!busy&&input.trim())?"pointer":"not-allowed",fontSize:"1.05rem"}}>›</button>
            </div>
          </div>
        )}
      </div>

      <div style={{padding:".42rem 1rem",flexShrink:0,borderTop:`1px solid rgba(201,168,76,.07)`,background:"rgba(0,0,0,.52)",fontSize:".68rem",color:"rgba(201,168,76,.6)",fontStyle:"italic",textAlign:"center",minHeight:32,display:"flex",alignItems:"center",justifyContent:"center"}}>
        {EVENTS[evIdx]}
      </div>

      <MailboxPanel open={mailboxOpen} onClose={()=>setMailboxOpen(false)} mailbox={mailbox} onOpenAction={handleMailAction} onMarkRead={markMailRead}/>
      <ChroniclePanel open={chronicleOpen} onClose={() => setChronicleOpen(false)} day={day} timeIdx={timeIdx} chronicle={chronicle} activityLog={activityLog}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
